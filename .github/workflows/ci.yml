name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The core compiles against the Java 17 floor toolchain; 21 is the matrix's
      # upper toolchain (1.20.5+). Install both so Gradle's toolchain detection
      # finds 17 (the Foojay resolver auto-provisions anything still missing).
      - name: Set up JDKs 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build & unit tests
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build --stacktrace
          else
            echo "::notice::Gradle build not scaffolded yet — skipping (foundation phase)."
          fi

  # The real-server integration matrix (Paper AND Folia across the version range) lives in its own
  # workflow, live-matrix.yml: a curated risk-edge subset on every PR (blocking) + the full range nightly
  # (advisory). The 1.8.9 lane is legacy.yml. The `./gradlew build` above already enforces the per-module
  # branch-coverage floor (it rides `check`), so this job is the blocking unit + coverage gate.
