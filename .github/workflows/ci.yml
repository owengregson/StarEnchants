name: CI

# PR-only: with branch protection's "require up to date before merging" (strict) set, a rebase-merge makes
# main's tree identical to what the PR already tested, so re-running CI on the main push is pure duplication.
# main is guarded by that strict check + release.yml's own build/smoke gate; direct pushes are blocked.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The core compiles against the Java 17 floor toolchain; 21 is the matrix's
      # upper toolchain (1.20.5+). Install both so Gradle's toolchain detection
      # finds 17 (the Foojay resolver auto-provisions anything still missing).
      - name: Set up JDKs 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build & unit tests
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build --stacktrace
          else
            echo "::notice::Gradle build not scaffolded yet — skipping (foundation phase)."
          fi

  # The JMH hot-path gate (docs/architecture.md §8, performance-hot-paths): a short-mode pass that FAILS on a
  # throughput floor or a per-op allocation budget regression. Its own job so it parallelizes with the build.
  bench:
    name: JMH hot-path gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDKs 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: JMH throughput + allocation gate
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :bench:jmhCheck --stacktrace
          else
            echo "::notice::Gradle build not scaffolded yet — skipping (foundation phase)."
          fi

  # The real-server integration matrix (Paper AND Folia across the version range) lives in its own
  # workflow, live-matrix.yml: a curated risk-edge subset on every PR (blocking) + the full range nightly
  # (advisory). The 1.8.9 lane is legacy.yml. The `./gradlew build` above already enforces the per-module
  # branch-coverage floor (it rides `check`), so this job is the blocking unit + coverage gate.
