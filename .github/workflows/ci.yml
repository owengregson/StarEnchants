name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The core compiles against the Java 17 floor toolchain; 21 is the matrix's
      # upper toolchain (1.20.5+). Install both so Gradle's toolchain detection
      # finds 17 (the Foojay resolver auto-provisions anything still missing).
      - name: Set up JDKs 17 + 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build & unit tests
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build --stacktrace
          else
            echo "::notice::Gradle build not scaffolded yet — skipping (foundation phase)."
          fi

  # The real-server integration matrix (Paper AND Folia across the version
  # range) is added when the build + tester module land. Tracked in
  # docs/development.md and the matrix-gate skill.
