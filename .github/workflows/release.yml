name: Release

# Auto-release criterion (ADR-0025): a release is cut when the project VERSION on
# `main` becomes a non-SNAPSHOT value that has not been released yet. The version
# lives in `build.gradle.kts` (and is stamped into plugin.yml), so bumping it —
# e.g. `0.1.0-SNAPSHOT` -> `1.0.0` — in a merged PR is the single, reviewable
# signal that ships a build. `-SNAPSHOT` versions never release; an already-tagged
# version is a no-op (idempotent). `workflow_dispatch` re-runs the same check by hand.
#
# The published artifact is a SINGLE Multi-Release mega-jar — StarEnchants-<version>.jar — that loads the
# modern Java-17 (class v61) tree on Paper/Folia 1.17.1 -> 26.1.x and the legacy Java-8 (class v52) tree on
# Minecraft 1.8.x, the JVM selecting the right tree automatically (scripts/build-mega-jar.sh; JEP 238). One
# download covers every supported version — there is no separate 1.8 jar. The unit gate (`./gradlew build`)
# and the live 1.8 smoke (BuildTools-compiled craftbukkit-1.8.8 booted under JDK 8) both run here and GATE the
# release: per the §11 ownership commitment the 1.8 tree must not ship without its Gate-4 green, so a smoke
# failure fails the whole release. The live Paper+Folia matrix remains the LOCAL pre-release gate (gitignored
# reference cache) — run `scripts/run-matrix.sh --all` before bumping the version.

on:
  push:
    branches: [ main ]
    paths: [ 'build.gradle.kts' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Decide whether to release
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"(.*)".*/\1/p' build.gradle.kts | head -1)"
          if [ -z "$version" ]; then
            echo "::error::Could not parse a version = \"...\" line from build.gradle.kts"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -q -- '-SNAPSHOT'; then
            echo "::notice::Version $version is a SNAPSHOT — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "::notice::Release v$version already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Version $version is new and non-SNAPSHOT — will build and publish v$version."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Build & publish
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so GitHub's auto-generated notes can diff against the
          # previous tag.
          fetch-depth: 0

      # 8 boots the 1.8 live smoke (a hard release gate); 17 is the floor toolchain; 21 the matrix's upper.
      # Listed so JAVA_HOME (the last) is 21 — Gradle's toolchain detection finds 17 — while JAVA_HOME_8_X64
      # boots the legacy (v52) half of the mega-jar on real 1.8.8. The Foojay resolver auto-provisions anything missing.
      - name: Set up JDKs 8 + 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # craftbukkit-1.8.8 is on no public maven; Spigot BuildTools compiles it on the runner (legal — never
      # redistributed). Shared cache key with legacy.yml so a PR run primes it. See legacy.yml for the rationale.
      - name: Cache craftbukkit-1.8.8
        id: cb
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository/org/bukkit/craftbukkit
            ~/se-legacy-buildtools/craftbukkit-1.8.8.jar
          key: craftbukkit-1.8.8-v1

      - name: Compile craftbukkit-1.8.8 via BuildTools (first run only)
        if: steps.cb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/se-legacy-buildtools && cd ~/se-legacy-buildtools
          git config --global user.email "ci@starenchants.invalid"
          git config --global user.name "StarEnchants CI"
          curl -fsSL -o BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          # Retry: BuildTools' jgit clone + downloads occasionally truncate (transient "Premature EOF"); the
          # work dir persists between attempts so a retry resumes. Once it succeeds the cache makes it moot.
          ok=0
          for attempt in 1 2 3; do
            if "$JAVA_HOME_8_X64/bin/java" -jar BuildTools.jar --rev 1.8.8 --compile craftbukkit; then ok=1; break; fi
            echo "::warning::BuildTools attempt $attempt failed (transient download?) — retrying in 20s"
            sleep 20
          done
          [ "$ok" = 1 ] || { echo "::error::BuildTools failed after 3 attempts"; exit 1; }
          # BuildTools already saves the runnable server jar here as craftbukkit-1.8.8.jar (its default output);
          # fall back to a find+copy only if a future version names it otherwise (guarded against a same-file cp).
          if [ ! -f craftbukkit-1.8.8.jar ]; then
            jar="$(find . -maxdepth 2 -name 'craftbukkit-1.8.8*.jar' ! -name '*sources*' ! -name '*remapped*' | head -1)"
            [ -n "$jar" ] || { echo "::error::BuildTools produced no craftbukkit-1.8.8 jar"; ls -la; exit 1; }
            cp "$jar" craftbukkit-1.8.8.jar
          fi

      # Needed by BOTH later steps: the live 1.8 boot AND the closed-world JDK-8 API gate (Gate 2) that runs
      # inside build-legacy-jar.sh (invoked by both legacy-smoke.sh and build-mega-jar.sh). Keep it before both.
      - name: Provision JDK 8 (1.8 boot + JDK-8 API gate baseline)
        run: ln -sfn "$JAVA_HOME_8_X64" ~/se-legacy-buildtools/jdk8

      - name: Unit gate (./gradlew build)
        run: ./gradlew build --stacktrace

      # §11 gate: the 1.8 tree must not ship without its live Gate-4 green. A failure here fails the release.
      - name: Live 1.8 smoke gate
        run: scripts/legacy-smoke.sh

      # Build the SINGLE Multi-Release mega-jar: the modern (v61) + downgraded legacy (v52) trees merged into
      # one artifact. The script (re)builds both trees and self-checks the era seam (base->1.8, versions/17->
      # modern, Multi-Release: true), failing the release if the merge is ever wrong.
      - name: Build single mega-jar
        run: scripts/build-mega-jar.sh

      # Boot the SHIPPED mega-jar itself on a real craftbukkit-1.8.8 under JDK 8 and assert it ENABLES from the
      # base (v52) tree — the release analogue of legacy-smoke.sh (which boots the TESTER jar), proving the
      # merged artifact selects + loads the legacy tree, not just that it built. Reuses the mega-jar from the
      # step above (SE_NO_BUILD=1) and the craftbukkit + JDK-8 setup already provisioned for the 1.8 smoke gate.
      # Only the legacy target runs here: the modern Paper targets need the gitignored local reference cache,
      # which CI does not carry (run-matrix.sh is the local pre-release gate for those).
      - name: Live mega-jar boot (1.8.8 base tree)
        run: SE_NO_BUILD=1 scripts/mega-smoke.sh legacy:1.8.8

      - name: Stage release artifact
        run: |
          mega="se/bootstrap/build/libs/StarEnchants-${VERSION}-mega.jar"
          if [ ! -f "$mega" ]; then
            echo "::error::Expected mega-jar not found at $mega"
            ls -la se/bootstrap/build/libs || true
            exit 1
          fi
          # Ship under the clean, single, user-facing name — the one jar a user downloads for ANY version.
          cp "$mega" "StarEnchants-${VERSION}.jar"
          sha256sum "StarEnchants-${VERSION}.jar" > "StarEnchants-${VERSION}.jar.sha256"

      - name: Create GitHub Release (tag v${{ env.VERSION }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "StarEnchants v${VERSION}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            "StarEnchants-${VERSION}.jar" \
            "StarEnchants-${VERSION}.jar.sha256"
