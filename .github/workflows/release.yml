name: Release

# Auto-release criterion (ADR-0025): a release is cut when the project VERSION on
# `main` becomes a non-SNAPSHOT value that has not been released yet. The version
# lives in `build.gradle.kts` (and is stamped into plugin.yml), so bumping it —
# e.g. `0.1.0-SNAPSHOT` -> `1.0.0` — in a merged PR is the single, reviewable
# signal that ships a build. `-SNAPSHOT` versions never release; an already-tagged
# version is a no-op (idempotent). `workflow_dispatch` re-runs the same check by hand.
#
# The published artifacts are (1) the bootstrap fat jar — the one universal plugin jar, 1.17.1 -> 26.1.x +
# Folia — and (2) the OPTIONAL 1.8.9 second jar. The unit gate (`./gradlew build`) and the live 1.8.9 smoke
# (BuildTools-compiled craftbukkit-1.8.8 booted under JDK 8) both run here and GATE the release: per the §11
# ownership commitment the legacy lane must not ship without its Gate-4 green, so a smoke failure fails the whole
# release. The live Paper+Folia matrix remains the LOCAL pre-release gate (gitignored reference cache) — run
# `scripts/run-matrix.sh --all` before bumping the version.

on:
  push:
    branches: [ main ]
    paths: [ 'build.gradle.kts' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Decide whether to release
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"(.*)".*/\1/p' build.gradle.kts | head -1)"
          if [ -z "$version" ]; then
            echo "::error::Could not parse a version = \"...\" line from build.gradle.kts"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -q -- '-SNAPSHOT'; then
            echo "::notice::Version $version is a SNAPSHOT — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "::notice::Release v$version already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Version $version is new and non-SNAPSHOT — will build and publish v$version."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Build & publish
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so GitHub's auto-generated notes can diff against the
          # previous tag.
          fetch-depth: 0

      # 8 boots the optional 1.8.9 lane's live smoke; 17 is the floor toolchain; 21 the matrix's upper. Listed
      # so JAVA_HOME (the last) is 21 — Gradle's toolchain detection finds 17 — while JAVA_HOME_8_X64 boots the
      # downgraded legacy jar. The Foojay resolver auto-provisions anything missing.
      - name: Set up JDKs 8 + 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # craftbukkit-1.8.8 is on no public maven; Spigot BuildTools compiles it on the runner (legal — never
      # redistributed). Shared cache key with legacy.yml so a PR run primes it. See legacy.yml for the rationale.
      - name: Cache craftbukkit-1.8.8
        id: cb
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository/org/bukkit/craftbukkit
            ~/se-legacy-buildtools/craftbukkit-1.8.8.jar
          key: craftbukkit-1.8.8-v1

      - name: Compile craftbukkit-1.8.8 via BuildTools (first run only)
        if: steps.cb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/se-legacy-buildtools && cd ~/se-legacy-buildtools
          git config --global user.email "ci@starenchants.invalid"
          git config --global user.name "StarEnchants CI"
          curl -fsSL -o BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          "$JAVA_HOME_8_X64/bin/java" -jar BuildTools.jar --rev 1.8.8 --compile craftbukkit
          # BuildTools already saves the runnable server jar here as craftbukkit-1.8.8.jar (its default output);
          # fall back to a find+copy only if a future version names it otherwise (guarded against a same-file cp).
          if [ ! -f craftbukkit-1.8.8.jar ]; then
            jar="$(find . -maxdepth 2 -name 'craftbukkit-1.8.8*.jar' ! -name '*sources*' ! -name '*remapped*' | head -1)"
            [ -n "$jar" ] || { echo "::error::BuildTools produced no craftbukkit-1.8.8 jar"; ls -la; exit 1; }
            cp "$jar" craftbukkit-1.8.8.jar
          fi

      - name: Provision JDK 8 for the legacy boot
        run: ln -sfn "$JAVA_HOME_8_X64" ~/se-legacy-buildtools/jdk8

      - name: Build plugin jar (unit gate + fat jar)
        run: ./gradlew build :bootstrap:jar --stacktrace

      # §11 gate: the 1.8.9 lane must not ship without its live Gate-4 green. A failure here fails the release.
      - name: Live 1.8.9 smoke gate
        run: scripts/legacy-smoke.sh

      - name: Build legacy 1.8.9 jar
        run: scripts/build-legacy-jar.sh bootstrap

      - name: Stage release artifacts
        run: |
          src="se/bootstrap/build/libs/bootstrap-${VERSION}.jar"
          if [ ! -f "$src" ]; then
            echo "::error::Expected plugin jar not found at $src"
            ls -la se/bootstrap/build/libs || true
            exit 1
          fi
          cp "$src" "StarEnchants-${VERSION}.jar"
          sha256sum "StarEnchants-${VERSION}.jar" > "StarEnchants-${VERSION}.jar.sha256"

          legacy="se/bootstrap/build/libs/StarEnchants-${VERSION}-legacy.jar"
          if [ ! -f "$legacy" ]; then
            echo "::error::Expected legacy jar not found at $legacy"
            ls -la se/bootstrap/build/libs || true
            exit 1
          fi
          cp "$legacy" "StarEnchants-${VERSION}-1.8.9.jar"
          sha256sum "StarEnchants-${VERSION}-1.8.9.jar" > "StarEnchants-${VERSION}-1.8.9.jar.sha256"

      - name: Create GitHub Release (tag v${{ env.VERSION }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "StarEnchants v${VERSION}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            "StarEnchants-${VERSION}.jar" \
            "StarEnchants-${VERSION}.jar.sha256" \
            "StarEnchants-${VERSION}-1.8.9.jar" \
            "StarEnchants-${VERSION}-1.8.9.jar.sha256"
