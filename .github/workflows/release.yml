name: Release

# Auto-release criterion (ADR-0025): a release is cut when the project VERSION on
# `main` becomes a non-SNAPSHOT value that has not been released yet. The version
# lives in `build.gradle.kts` (and is stamped into plugin.yml), so bumping it —
# e.g. `0.1.0-SNAPSHOT` -> `1.0.0` — in a merged PR is the single, reviewable
# signal that ships a build. `-SNAPSHOT` versions never release; an already-tagged
# version is a no-op (idempotent). `workflow_dispatch` re-runs the same check by hand.
#
# The published artifact is the bootstrap fat jar (the one universal plugin jar,
# 1.17.1 -> 26.1.x + Folia). The unit gate (`./gradlew build`) runs first; the live
# Paper+Folia matrix is the LOCAL pre-release gate (it needs the gitignored server
# reference cache) — run `scripts/run-matrix.sh --all` before bumping the version.

on:
  push:
    branches: [ main ]
    paths: [ 'build.gradle.kts' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate:
    name: Decide release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Decide whether to release
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"(.*)".*/\1/p' build.gradle.kts | head -1)"
          if [ -z "$version" ]; then
            echo "::error::Could not parse a version = \"...\" line from build.gradle.kts"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -q -- '-SNAPSHOT'; then
            echo "::notice::Version $version is a SNAPSHOT — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "::notice::Release v$version already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Version $version is new and non-SNAPSHOT — will build and publish v$version."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Build & publish
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so GitHub's auto-generated notes can diff against the
          # previous tag.
          fetch-depth: 0

      # The core compiles against the Java 17 floor toolchain; 21 is the matrix's
      # upper toolchain. Install both (mirrors ci.yml) so Gradle's toolchain
      # detection finds 17; the Foojay resolver auto-provisions anything missing.
      - name: Set up JDKs 17 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build plugin jar (unit gate + fat jar)
        run: ./gradlew build :bootstrap:jar --stacktrace

      - name: Stage release artifact
        run: |
          src="se/bootstrap/build/libs/bootstrap-${VERSION}.jar"
          if [ ! -f "$src" ]; then
            echo "::error::Expected plugin jar not found at $src"
            ls -la se/bootstrap/build/libs || true
            exit 1
          fi
          cp "$src" "StarEnchants-${VERSION}.jar"
          sha256sum "StarEnchants-${VERSION}.jar" > "StarEnchants-${VERSION}.jar.sha256"

      - name: Create GitHub Release (tag v${{ env.VERSION }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "StarEnchants v${VERSION}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            "StarEnchants-${VERSION}.jar" \
            "StarEnchants-${VERSION}.jar.sha256"
