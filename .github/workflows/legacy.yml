name: Legacy 1.8.9

# The OPTIONAL Minecraft 1.8.9 second jar's live gate (docs/legacy-1.8.9-codeshare-design.md §6/§11): the 1.8
# analogue of the local run-matrix.sh. It dual-compiles the whole plugin against a real craftbukkit-1.8.8,
# lowers it to Java 8 (JvmDowngrader), boots a real 1.8.8 server under JDK 8, runs the reduced smoke suite, and
# fails on anything but a fresh PASS. Per the §11 ownership commitment the 1.8 lane must not ship without this
# green — so it runs on every push/PR that touches the engine or the legacy build (and gates the release jar).

on:
  push:
    branches: [ main ]
    paths:
      - 'se/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'scripts/build-legacy-jar.sh'
      - 'scripts/legacy-smoke.sh'
      - 'scripts/jdk8-api-gate.sh'
      - 'scripts/jdk8-api-gate.allow'
      - 'scripts/tools/**'
      - '.github/workflows/legacy.yml'
  pull_request:
    paths:
      - 'se/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'scripts/build-legacy-jar.sh'
      - 'scripts/legacy-smoke.sh'
      - 'scripts/jdk8-api-gate.sh'
      - 'scripts/jdk8-api-gate.allow'
      - 'scripts/tools/**'
      - '.github/workflows/legacy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: 1.8.9 dual-compile + live smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # JDK 8 compiles + boots the 1.8 lane; JDK 17 runs Gradle + JvmDowngrader. Listed 8-then-17 so the LAST
      # (JAVA_HOME) is 17 (Gradle's toolchain needs it), while JAVA_HOME_8_X64 boots the downgraded jar.
      - name: Set up JDKs 8 + 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            17

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # craftbukkit-1.8.8 is on no public maven (BuildTools-local only). Spigot BuildTools compiles it on the
      # runner — legal, and it is never redistributed (stays on the runner). Cache BOTH the maven artifact (the
      # dual-compile classpath, resolved via mavenLocal) AND the runnable server jar (the boot), so the slow
      # BuildTools compile runs once. The key has no inputs hash: 1.8.8 is immutable — bump -v2 to force a rebuild.
      - name: Cache craftbukkit-1.8.8
        id: cb
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository/org/bukkit/craftbukkit
            ~/se-legacy-buildtools/craftbukkit-1.8.8.jar
          key: craftbukkit-1.8.8-v1

      - name: Compile craftbukkit-1.8.8 via BuildTools (first run only)
        if: steps.cb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/se-legacy-buildtools && cd ~/se-legacy-buildtools
          git config --global user.email "ci@starenchants.invalid"
          git config --global user.name "StarEnchants CI"
          curl -fsSL -o BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          # BuildTools compiles 1.8.8 under JDK 8 and installs org.bukkit:craftbukkit:1.8.8-R0.1-SNAPSHOT to ~/.m2.
          # Retry: its jgit clone + Mojang/maven downloads occasionally truncate (transient "Premature EOF");
          # the work dir persists between attempts so a retry resumes. Once it succeeds the cache makes it moot.
          ok=0
          for attempt in 1 2 3; do
            if "$JAVA_HOME_8_X64/bin/java" -jar BuildTools.jar --rev 1.8.8 --compile craftbukkit; then ok=1; break; fi
            echo "::warning::BuildTools attempt $attempt failed (transient download?) — retrying in 20s"
            sleep 20
          done
          [ "$ok" = 1 ] || { echo "::error::BuildTools failed after 3 attempts"; exit 1; }
          # BuildTools already saves the runnable server jar here as craftbukkit-1.8.8.jar (its default output);
          # fall back to a find+copy only if a future version names it otherwise (guarded against a same-file cp).
          if [ ! -f craftbukkit-1.8.8.jar ]; then
            jar="$(find . -maxdepth 2 -name 'craftbukkit-1.8.8*.jar' ! -name '*sources*' ! -name '*remapped*' | head -1)"
            [ -n "$jar" ] || { echo "::error::BuildTools produced no craftbukkit-1.8.8 jar"; ls -la; exit 1; }
            cp "$jar" craftbukkit-1.8.8.jar
          fi

      # Needed BOTH to boot the 1.8 server AND as the baseline for the closed-world JDK-8 API gate (Gate 2)
      # that build-legacy-jar.sh runs after the downgrade. Must precede legacy-smoke.sh (it builds the jar + gates).
      - name: Provision JDK 8 (1.8 boot + JDK-8 API gate baseline)
        run: ln -sfn "$JAVA_HOME_8_X64" ~/se-legacy-buildtools/jdk8

      - name: Live 1.8.9 smoke (dual-compile + downgrade + boot + assert fresh PASS)
        run: scripts/legacy-smoke.sh
