name: Lint

# PR-only (see ci.yml): strict up-to-date-before-merge makes the post-merge main run a duplicate of the PR run.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            #deobf
            #node_modules

  workflows:
    name: GitHub workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
