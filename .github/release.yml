# Configuration for GitHub's auto-generated release notes.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: ✨ Features
      labels: [feature, enhancement]
    - title: 🐛 Fixes
      labels: [bug, fix]
    - title: ⚡ Performance
      labels: [performance]
    - title: 🧩 Cross-version / Folia
      labels: [cross-version, folia]
    - title: 📚 Docs
      labels: [documentation, docs]
    - title: 🏗️ Build / CI
      labels: [ci, build, dependencies]
    - title: 🔧 Other changes
      labels: ["*"]
