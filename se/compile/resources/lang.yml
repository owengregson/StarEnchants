# ── Carrier apply outcomes (enchant books, success dust, white scroll — the drag-onto-gear economy) ──────
# The carrier is a book/dust/white-scroll dragged onto gear. A failed roll spends the carrier; the enchant
# book's failure branch depends on the book likeness (protection saved it / it shattered / it survived).
carrier.not-carrier: "&cThat is not an enchant carrier."
carrier.apply-target: "&cApply the carrier onto an item."
carrier.single-item: "&cApply the carrier to a single item — split the stack first."
carrier.grants-nothing: "&cThis carrier grants nothing applicable."
carrier.fail-protected: "&eThe enchant failed — but your protection saved the item."
carrier.fail-shattered: "&cThe enchant failed — the item shattered."
carrier.fail-unharmed: "&eThe enchant failed — the item is unharmed."
# Success dust boosts a book's apply chance. {PERCENT} = the book's new success; {MAX} = the books.max-success ceiling.
carrier.success-now: "&aThe book's success chance is now &f{PERCENT}%&a."
carrier.dust.only-book: "&cDust can only boost an enchant book."
carrier.dust.ceiling: "&7That book is already at the &f{MAX}%&7 success ceiling."
carrier.dust.no-bonus: "&cThis dust confers no success bonus."
# White scroll — a one-shot protect against a failed enchant (its own apply-success roll gates the guard).
white-scroll.already: "&7That item is already protected."
white-scroll.fail: "&eThe White Scroll failed — the item is not protected."
white-scroll.applied: "&aProtected — a failed enchant will spare this item once."
