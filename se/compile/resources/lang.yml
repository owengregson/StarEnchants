# StarEnchants — messages (docs/v3-directives.md §L).
#
# This file is the ONE canonical catalogue of every player-facing chat message. It ships inside the jar and
# IS the built-in default (Lang.defaults() reads this very resource — there is no second copy in Java), and
# a copy is written to plugins/StarEnchants/lang.yml on first boot for you to edit.
#
# Every message is a dotted key. Legacy '&' colour codes; {TOKEN} placeholders are filled at send time (the
# token names are shown in each comment where non-obvious). Edit the on-disk copy, then run /se reload —
# lang.yml reloads together with config.yml, items/, menus/ and content/ in one transaction. Any key you
# omit from your copy falls back to this built-in default, so you can keep only the lines you customise.

