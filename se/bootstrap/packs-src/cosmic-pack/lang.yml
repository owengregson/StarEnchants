# StarEnchants — messages (docs/v3-directives.md §L).
#
# Every player-facing message, by dotted key. Legacy '&' colour codes; {TOKEN} placeholders are filled at
# send time (the token names are shown in each comment where non-obvious). Edit here, then run /se reload —
# lang.yml reloads together with config.yml, items/, menus/ and content/ in one transaction. Any key you
# omit falls back to the built-in English default, so you can keep only the lines you customise.

