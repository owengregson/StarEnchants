# StarEnchants — cosmic-pack message OVERLAY (docs/v3-directives.md §L; ADR-0023).
#
# A pack's lang.yml is an OVERLAY, not a full copy: it lists ONLY the keys this pack re-themes, and every
# other message falls back to the built-in default catalogue (se/compile/resources/lang.yml). Keeping this a
# diff — rather than a full mirror — means a newly-shipped default message (a new command, a new item) is
# inherited automatically instead of being silently dropped by a stale copy.
#
# cosmic-pack re-themes only the soul-gem strings as Cosmic-Enchants-style likenesses; everything else uses
# the default English.

# ── Soul gem (Cosmic-Enchants likeness) ────────────────────────────────────────────────────────────────
command.soul.no-gem: "&c&l(!)&r &cThis item is not a soul gem!"
command.soul.split-usage: "&7Usage: &f/splitsouls [amount]&r"
command.soul.split-ok: "&a&l(!)&r &aSoul gem has been split."
command.soul.split-too-many: "&c&l(!)&r &cYou don't have enough souls to do that!"
soul.soul-use: "&e&l** SOULS: &6&n&l{AMOUNT}&r&e&l **"
