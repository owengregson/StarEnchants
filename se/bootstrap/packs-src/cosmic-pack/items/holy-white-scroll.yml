# Holy White Scroll — the Cosmic Pack likeness (docs/v3-directives.md §I). Drag onto a piece of gear
# to APPLY a one-shot keep-on-death marker to THAT item; when you die the marked item is kept and the marker
# consumed. Applied items are not exclusive — a holy white scroll may sit alongside a white scroll and any
# trak gems. Only the name/lore/material differ from the default item; the mechanic is global.
# reload with /se reload.
type: holy-white-scroll

material: MAP
name: "&6&lHoly White Scroll"
# Authored lore lines auto-wrap at config lore.item-wrap.
lore:
  - "&eA legendary item that protects an item from being lost from the inventory upon death. This scroll will be consumed and removed from the item upon death."
  - "&7Drag n' Drop on an item to apply."
# Each apply rolls a success in [min-success, max-success] (each 0–100). On a failed roll the scroll is spent
# without protecting (it never destroys gear). 100/100 = always succeeds.
min-success: 100
max-success: 100
