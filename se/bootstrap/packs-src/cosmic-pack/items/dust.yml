# Magic Dust — the Cosmic Pack likeness of the success dust (docs/v3-directives.md §I; ADR-0019).
# Drag onto an enchant book to RAISE its success chance by success-bonus, clamped to the global
# books.max-success ceiling (config.yml). Pure economy metadata — never an ability, never the hot path.
# Only the name/lore differ from the default item; the mechanic knobs below are global. reload with /se reload.
type: dust

material: SUGAR
# {BONUS} = the conferred bonus; for a random dust it renders as the "10–25" range, or the exact value on a
# fixed dust (/se dust <percent>). {MAXSUCCESS} = the global success ceiling. The single lore line auto-wraps
# at config lore.item-wrap.
name: "&f&lMagic Dust [&r&a&n+{BONUS}%&r&f&l]"
lore:
  - "&eIncreases the success rate of any enchantment book by {BONUS}%, up to a maximum of {MAXSUCCESS}%."
  - "&7Drag n' Drop on an item to apply."
# A normal dust rolls a RANDOM bonus in [min-bonus, max-bonus] (each 0–100) when combined onto a book.
min-bonus: 10
max-bonus: 25
# Feedback played on a successful combine: a sound (namespaced, range-stable) + particle tokens
# (alias-resolved). Leave sound blank / particles empty for none.
sound: "block.amethyst_block.chime"
particles:
  - HAPPY_VILLAGER
