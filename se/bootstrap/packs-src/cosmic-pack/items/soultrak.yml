# SoulTrak Gem — the Cosmic Pack likeness (docs/v3-directives.md §I). Drag onto a weapon to reveal the
# LIFETIME number of players killed with it (tracked in the background from first use). Applied items are not
# exclusive — gear may carry several traks (blocktrak / mobtrak / soultrak) and a white/holy scroll at once.
# The mechanic is global; reload with /se reload.
type: soultrak

material: FIRE_CHARGE
name: "&c&lSoulTrak Gem"
# {KINDS} = the applies-to label; {COUNT} = the live count. Lore auto-wraps at config lore.item-wrap.
lore:
  - "&eDisplays the amount of players killed with the weapon since it was forged."
  - ""
  - "&eApplies to: &r&f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
applies-to: [WEAPON]
count-format: "&7Players Killed: &f{COUNT}"
