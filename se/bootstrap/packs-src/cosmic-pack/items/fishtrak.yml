# FishTrak Gem — the Cosmic Pack likeness (docs/v3-directives.md §I). Drag onto a fishing rod to reveal the
# LIFETIME number of fish caught with it (tracked in the background from first use). An item holds only ONE
# applied item at a time (blocktrak / mobtrak / soultrak / fishtrak / white scroll / holy white scroll). The
# mechanic is global; reload with /se reload.
type: fishtrak

material: CLAY_BALL
name: "&3&lFishTrak Gem"
# {KINDS} = the applies-to label; {COUNT} = the live count. Lore auto-wraps at config lore.item-wrap.
lore:
  - "&eDisplays the amount of fish caught with the rod since it was forged."
  - ""
  - "&eApplies to: &r&f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
applies-to: [FISHING_ROD]
count-format: "&7Fish Caught: &f{COUNT}"
