# The heroic upgrade item — a "Heroic Ingot" you drag onto any armour piece or weapon to reforge it into
# Heroic form (heroic is NOT set-bound). On success it stamps the heroic stats, swaps the DISPLAY to a gold
# piece, and — with diamond-stats on — keeps it functioning as diamond (attack / armour / durability) via the
# plugin's own combat maths (no version-specific item-attribute API). Everything below is configurable.
type: heroic
material: GOLD_INGOT
name: "&e&k|||&r &6&lHeroic Ingot&r &e&k|||&r"
# {SUCCESS}/{FAILURE} = the success/failure rate; {OUTGOING}/{INCOMING}/{DURABILITY} = the per-stat percents;
# {KINDS} = what it applies to (our unified item-lore tokens). Auto-wrapped where the renderer wraps.
lore:
  - "&a{SUCCESS}% Success Rate"
  - "&c{FAILURE}% Failure Rate"
  - ""
  - "&e* &6+{OUTGOING}% Outgoing Damage"
  - "&e* &6-{INCOMING}% Incoming Damage"
  - "&e* &6+{DURABILITY}% Durability"
  - ""
  - "&eReforges a single piece of gear into Heroic form, granting it legendary capabilities stronger than diamond."
  - ""
  - "&eApplies to: &f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
# Per-attempt success is drawn from [success-min, success-max]; min == max here for a single headline rate.
success-min: 50
success-max: 50
# Gear unharmed on a failed roll (the upgrade is consumed either way). Set true to destroy the gear on fail.
destroy-on-fail: false
# Heroic stats granted on success (fractions): weapon +outgoing, armour −incoming, and the wear-cancel chance
# (0.20 ≈ the piece takes 80% of normal durability damage).
percent-damage: 0.10
percent-reduction: 0.10
durability: 0.20
# entity = PvP/entity damage only (default); all = every damage cause.
reduction-scope: ENTITY
# Re-stat the gold display piece to diamond-equivalent attack/armour + durability via the plugin's combat maths.
diamond-stats: true
# The HEROIC lore line stamped on a reforged piece ({TYPE} = the gear kind).
lore-line: "&e&k|||&r &6&lHEROIC {TYPE} &r&e&k|||&r"
# Display swap on success: diamond gear becomes its gold twin (diamond stats kept via diamond-stats above).
material-upgrades:
  DIAMOND_HELMET: GOLDEN_HELMET
  DIAMOND_CHESTPLATE: GOLDEN_CHESTPLATE
  DIAMOND_LEGGINGS: GOLDEN_LEGGINGS
  DIAMOND_BOOTS: GOLDEN_BOOTS
  DIAMOND_SWORD: GOLDEN_SWORD
  DIAMOND_AXE: GOLDEN_AXE
