# The physical crystal item — the ONE global "Armor Crystal" likeness (ADR-0034). Drag it onto a piece of
# gear to apply it (ALWAYS succeeds — no roll), or drag one crystal onto another to MERGE them into a
# multi-crystal (their effects combine, up to config.yml crystals.max-merge). Everything below is
# configurable; reload with /se reload.
#
# Every crystal (content/crystals/*.yml) declares only its styled display name, its description block and its
# effects; the material / name / lore below are SHARED by every minted crystal, single or merged. Tokens:
#   {CRYSTAL}     — the component crystal name(s), comma-joined (a merge reads each name in its own colour).
#   {DESCRIPTION} — each component's authored bonus block, stacked with a blank line between blocks.
#   {KINDS}       — the item kinds the crystal applies to (the intersection for a merge).
# Once a crystal carries MORE than one component (a merge), it takes the `name-multi` / `lore-while-on-item-multi`
# templates instead — here "Armor Crystal" becomes "Multi Crystal" (ADR-0035). Each defaults to its single form.
type: crystal
material: NETHER_STAR
name: "&6&lArmor Crystal ({CRYSTAL}&6&l)"
name-multi: "&6&lMulti Crystal ({CRYSTAL}&6&l)"
lore:
  - "&eImbues a single piece of gear with magic crystal abilities. Merge with other crystals to combine their effects."
  - ""
  - "{DESCRIPTION}"
  - ""
  - "&eApplies to: &f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
# The line shown on crystal-bearing gear (below the orb-slots line, above the heroic line). Here it is the
# crystal item's own name; a merged crystal shows the Multi Crystal line instead (ADR-0035).
lore-while-on-item: "&6&lArmor Crystal ({CRYSTAL}&6&l)"
lore-while-on-item-multi: "&6&lMulti Crystal ({CRYSTAL}&6&l)"
# Apply/merge and extract gesture sounds (namespaced keys, valid across the version range).
sounds:
  enabled: true
  apply: "block.amethyst_block.chime"
  remove: "block.amethyst_cluster.break"
# The crystal EXTRACTOR. On crystal-bearing GEAR it pops the whole last crystal off intact — a multi-crystal
# comes back as one multi-crystal (ADR-0035); apply the extractor again to THAT crystal item to split its
# topmost single off. On a multi-crystal ITEM it pops the topmost single.
extractor:
  material: AMETHYST_CLUSTER
  name: "&dCrystal Extractor"
  lore:
    - "&7Drag onto gear to pop its crystal off"
    - "&7whole, or onto a multi-crystal to split it."
