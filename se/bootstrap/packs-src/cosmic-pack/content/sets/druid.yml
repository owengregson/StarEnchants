# Druid — nature-themed diamond set; offensive damage carried on the Earth Splitter axe.
display: "&2&lDruid"
description: "&2Embrace the power of nature with the Druid Set, crafted from the essence of the natural world, channeling life force and woodland grace."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&2&l** Druid SET EQUIPPED &2&l**\n"
remove-message: "\n&7&l** Druid SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&2Embrace the power of nature with the Druid Set, crafted from the essence of the natural world, channeling life force and woodland grace."
    - ""
    - "&2&lDRUID SET BONUS"
    - "&2* Deal 30% more damage to all enemies"
    - "&2* Terrabender Passive Ability"
    - "&7&o(Requires all four Druid set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&2&lNature's Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&2&lEarthbound Plate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&2&lSylvan Pants&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&2&lGrove Trotters&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_AXE
  name: "&2&lEarth Splitter&r"
  lore:
    - "&2Wield the Earth Splitter, an axe infused with the life force of the forest, cutting through enemies with the power of nature."
    - ""
    - "&2&lDRUID WEAPON BONUS"
    - "&2* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Druid set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects: []
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
