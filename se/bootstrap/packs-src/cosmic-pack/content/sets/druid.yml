# Druid — nature-themed diamond set; offensive damage carried on the Earth Splitter axe.
display: "&2&lDruid"
description: "&2Embrace the power of nature with the Druid Set, crafted from the essence of the natural world, channeling life force and woodland grace."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&2&l** Druid SET EQUIPPED &2&l**\n"
remove-message: "\n&7&l** Druid SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&2Embrace the power of nature with the Druid Set, crafted from the essence of the natural world, channeling life force and woodland grace."
    - ""
    - "&2&lDRUID SET BONUS"
    - "&2* Deal 30% more damage to all enemies"
    - "&2* Terrablender Ability"
    - ""
    - "&2&lTERRABLENDER"
    - "&2* Chance to drop earth on your enemy, temporarily slowing them and dealing massive damage"
    - "&7&o(Requires all four Druid set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&2&lNature's Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&2&lEarthbound Plate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&2&lSylvan Pants&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&2&lGrove Trotters&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_AXE
  name: "&2&lEarth Splitter&r"
  lore:
    - "&2Wield the Earth Splitter, an axe infused with the life force of the forest, cutting through enemies with the power of nature."
    - ""
    - "&2&lDRUID WEAPON BONUS"
    - "&2* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Druid set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  # Terrablender — 15% on hit (30s cd; mob and player targets cool down separately): rain a 3x3 grid of grass
  # blocks above the victim. Whichever
  # block lands on a player fires the IMPACT bonus below; carry forwards this hit's damage as the impact %damage%.
  - on: armor
    trigger: ATTACK
    chance: 15
    cooldown: 600
    effects:
      - { FALLING_BLOCK: { material: GRASS_BLOCK, radius: 1, height: 4, ttl: 40, carry: "%damage%", who: "@Victim" } }
      - { MESSAGE: { channel: title, text: "&2&l** TERRABLENDER **", subtitle: "&7from &c{ATTACKER}", who: "@Victim" } }
      - { MESSAGE: { text: "&2&l** TERRABLENDER &r&7[&f{VICTIM}&7] &r&2&l**" } }
  # IMPACT — fired when a Terrablender grass block lands ON a player. The short cooldown dedups the grid's many
  # landings (one impact per cast). Deal 1.5x the carried hit and lock their SPEED away for 5s (continuously
  # re-stripped, so they can't re-drink it back during the window).
  - on: armor
    trigger: IMPACT
    cooldown: 10
    effects:
      - { DAMAGE: { amount: "1.5 * %damage%", who: "@Victim" } }
      - { POTION_LOCK: { effect: SPEED, ticks: 100, who: "@Victim" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
