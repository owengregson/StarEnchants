# Cupid — love-themed diamond set: damage boost, defensive reduction, bow resistance.
display: "&d&lCupid"
description: "&dMove with the grace of a lover with the Cupid Set, infused with the power of passion."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&d&l** Cupid SET EQUIPPED &d&l**\n"
remove-message: "\n&7&l** Cupid SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&dMove with the grace of a lover with the Cupid Set, infused with the power of passion."
    - ""
    - "&d&lCUPID SET BONUS"
    - "&d* Deal 30% more damage to all enemies"
    - "&d* Enemies deal 20% less damage to you"
    - "&d* Bow attacks deal 75% less damage to you"
    - "&d* Lovestruck Ability"
    - ""
    - "&d&lLOVESTRUCK"
    - "&d* Permanent Regeneration I"
    - "&d* Chance to remove half of your victim's overhealth for 3 seconds"
    - "&7&o(Requires all four Cupid set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&d&lCherubic Crown&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&d&lHeartfelt Armor&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&d&lPassionate Greaves&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&d&lAmorous Sandals&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&d&lCupid's Dagger&r"
  lore:
    - "&dWield Cupid's Dagger, a blade forged from the essence of love, capable of piercing hearts with its power."
    - ""
    - "&d&lCUPID WEAPON BONUS"
    - "&d* Deal 5% more damage to all enemies."
    - "&7&o(Requires all four Cupid set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 20 } }
  # Lovestruck (permanent) — Regeneration I while the full set is worn.
  - on: armor
    trigger: [PASSIVE]
    chance: 100
    effects:
      - { POTION: { effect: REGENERATION, level: 1, duration: 200, who: "@Self" } }
  # Lovestruck — 5% on hit (30s cd): strip HALF the victim's overhealth (max health above 20) for 3s.
  # The condition gate runs before the cooldown arms, so a no-overhealth hit never burns the 30s.
  - on: armor
    trigger: ATTACK
    chance: 15
    cooldown: 600
    condition: "%victim.maxhealth% > 20"
    effects:
      - { MAX_HEALTH_DRAIN: { fraction: 0.5, baseline: 20, amount: 0, duration: 60, who: "@Victim" } }
      - { MESSAGE: { channel: title, text: "&d&l** LOVESTRUCK **", subtitle: "&7from &c{ATTACKER}", who: "@Victim" } }
      - { MESSAGE: { text: "&d&l** LOVESTRUCK &r&7[&f{VICTIM}&7] &r&d&l**" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
