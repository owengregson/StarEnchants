# Supreme — royal diamond set: 15% damage reduction + 15% extra outgoing damage.
display: "&4&lSupreme"
description: "&4Step into the realm of royalty with the Supreme set, garments woven with threads of unmatched grandeur."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&4&l** Supreme SET EQUIPPED &4&l**\n"
remove-message: "\n&7&l** Supreme SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&4Step into the realm of royalty with the Supreme set, garments woven with threads of unmatched grandeur."
    - ""
    - "&4&lSUPREME SET BONUS"
    - "&4* Deal 15% more damage to all enemies."
    - "&4* Gifted Child Passive Ability"
    - ""
    - "&4&lGIFTED CHILD"
    - "&4* Gain the ability to fly while not in combat"
    - "&7&o(Requires all four Supreme set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&4&lClassic Cap&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&4&lGlorious Garment&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&4&lLuxurious Legs&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&4&lSupreme Slides&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&4&lSizable Scepter&r"
  lore:
    - "&4Command authority with the Sizable Scepter, a symbol of power and nobility that radiates with royal energy."
    - ""
    - "&4&lSUPREME WEAPON BONUS"
    - "&4* Deal 15% more damage to all enemies"
    - "&7&o(Requires all four Supreme set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 15 } }
  # Gifted Child — flight while the full set is worn AND not in combat. REPEATING re-checks the combat tag each
  # second; PASSIVE's teardown clears flight on unequip. Entering combat grounds you; leaving restores it.
  - on: armor
    trigger: [REPEATING, PASSIVE]
    repeat: 20
    chance: 100
    effects:
      - { FLY_MODE: { who: "@Self" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
