# Reaper — death-themed diamond set: reduce incoming damage, deal extra damage, debuff foes on hit.
display: "&4&lReaper"
description: "&4Embrace the dark power of the Reaper set, wielding the essence of death and fate."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&4&l** Reaper SET EQUIPPED &4&l**\n"
remove-message: "\n&7&l** Reaper SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&4Embrace the dark power of the Reaper set, wielding the essence of death and fate."
    - ""
    - "&4&lREAPER SET BONUS"
    - "&4* Deal 30% more damage to all enemies"
    - "&4* Enemies deal 15% less damage to you"
    - "&4* Mark of the Reaper Ability"
    - "&7&o(Requires all four Reaper set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&4&lGrim Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&4&lDeathly Shroud&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&4&lMortal Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&4&lGravewalker Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&4&lDeathbringer&r"
  lore:
    - "&4Bring doom to your foes with the Deathbringer, a blade that embodies the essence of mortality and fate."
    - ""
    - "&4&lREAPER WEAPON BONUS"
    - "&4* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Reaper set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 15 } }
  # Mark of the Reaper — 5% on hit (30s cd): mark the victim for 3s so the reaper deals +25% to them (applied
  # by the damage fold's per-(victim, marker) consult, read before attack abilities so the marking hit itself
  # is excluded).
  - on: armor
    trigger: ATTACK
    chance: 5
    cooldown: 600
    effects:
      - { MARK: { amount: 25, duration: 60, who: "@Victim" } }
  # The reaper's tether — a continuous dark-red dust beam redrawn every 0.5s from each still-marked victim to
  # the reaper (@Marked is empty when nothing is marked, so this is silent until a mark lands; like KOTH's aura).
  - on: armor
    trigger: REPEATING
    repeat: 10
    chance: 100
    effects:
      - { PARTICLE_LINE: { particle: REDSTONE, r: 170, g: 0, b: 0, density: 2, who: "@Marked{r=32}" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
      - { POTION: { effect: WEAKNESS, level: 1, duration: 100, who: "@Victim" } }
      - { POTION: { effect: WITHER, level: 2, duration: 100, who: "@Victim" } }
