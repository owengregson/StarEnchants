# Thor — diamond storm set; thunderous damage, reduction, and Mjolnir.
display: "&9&lThor"
description: "Wield the thunderous might of Thor, forged in the heart of storms."
complete: 4
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - ""
    - "&9&lTHOR SET BONUS"
    - "&9* Deal 25% more damage to all enemies"
    - "&9* Enemies deal 15% less damage to you"
    - "&9* Stormcaller Passive Ability"
    - "&7&o(Requires all four Thor set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&9&lElectric Helmet&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&9&lShocking Plate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&9&lProtective Garments&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&9&lCharged Sandals&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_AXE
  name: "&9&lMjolnir&r"
  lore:
    - "&9Wield the legendary Mjolnir, the hammer of"
    - "&9Thor, imbued with the thunderous power"
    - "&9of storms and lightning."
    - ""
    - "&9&lTHOR WEAPON BONUS"
    - "&9* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Thor set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 15 } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
