# Yeti — icy diamond set: bites harder, shrugs off blows, slows attackers.
display: "&b&lYeti"
description: "&bHarness the chilling might of the Yeti set, garments imbued with the frost of the highest peaks."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&b&l** Yeti SET EQUIPPED &b&l**\n"
remove-message: "\n&7&l** Yeti SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&bHarness the chilling might of the Yeti set, garments imbued with the frost of the highest peaks."
    - ""
    - "&b&lYETI SET BONUS"
    - "&b* Deal 10% more damage to all enemies"
    - "&b* Enemies deal 10% less damage to you"
    - "&b* Fortified Passive Ability"
    - ""
    - "&b&lFORTIFIED"
    - "&b* Chance to nullify an incoming attack and spawn a defensive Ice Wall in front of your enemy"
    - "&7&o(Requires all four Yeti set items.)&r"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&b&lFrozen Headgear&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&b&lArctic Plate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&b&lGlacial Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&b&lIcy Stompers&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_AXE
  name: "&b&lFrozen Mace&r"
  lore:
    - "&bBring the chill of the arctic with the Frozen Mace, an icy weapon that freezes all who dare oppose it."
    - ""
    - "&b&lYETI WEAPON BONUS"
    - "&b* Deal 10% more damage to all enemies"
    - "&7&o(Requires all four Yeti set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 10 } }
  # Fortified — 25% on being hit (30s cd): negate the hit and freeze the attacker in ice for 3s — a 2-tall pillar
  # one block ahead of them + a 3x3 packed-ice footprint at their feet, placed only where it replaces air.
  - on: armor
    trigger: DEFENSE
    chance: 25
    cooldown: 600
    effects:
      - { CANCEL: {} }
      - { TEMP_BLOCK: { shape: COLUMN, material: ICE, height: 2, ahead: 1, ticks: 60, airOnly: true, who: "@Attacker" } }
      - { TEMP_BLOCK: { shape: FOOTPRINT, material: PACKED_ICE, radius: 1, ticks: 60, airOnly: true, who: "@Attacker" } }
      - { MESSAGE: { channel: title, text: "&b&l** FORTIFIED **", subtitle: "&7from &c{ATTACKER}", who: "@Victim" } }
      - { MESSAGE: { text: "&b&l** FORTIFIED &r&7[&f{VICTIM}&7] &r&b&l**" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 20 } }
