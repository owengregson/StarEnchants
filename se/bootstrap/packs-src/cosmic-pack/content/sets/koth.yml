# King of the Hill — victory-spoils set: take less, deal more.
display: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH"
description: "&fRise to supremacy with the &c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &fset, clad in victory and the spoils of war."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&6&l** K.O.T.H SET EQUIPPED &6&l**\n"
remove-message: "\n&7&l** K.O.T.H SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&fRise to supremacy with the &c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &fset, clad in victory and the spoils of war."
    - ""
    - "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lSET BONUS"
    - "&f* Deal 30% more damage to all enemies"
    - "&f* Enemies deal 20% less damage to you"
    - "&f* Victorious Passive Ability"
    - "&7&o(Requires all four K.O.T.H set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lHelmet&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lChestplate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lLeggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lBoots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lSword&r"
  lore:
    - "&fClaim victory with the &c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &r&fSword, a weapon that symbolizes dominance and superior strength."
    - ""
    - "&c&lK&6&l.&e&lO&2&l.&b&lT&5&l.&d&lH &f&lWEAPON BONUS"
    - "&f* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four K.O.T.H set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 20 } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
