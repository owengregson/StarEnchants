# Fantasy — diamond set of mythical heroes; arcane weapon and a trap passive.
display: "&2&lFantasy"
description: "&2Embark on epic adventures with the Fantasy set, armaments of mythical heroes and timeless tales."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&2&l** Fantasy SET EQUIPPED &2&l**\n"
remove-message: "\n&7&l** Fantasy SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&2Embark on epic adventures with the Fantasy set, armaments of mythical heroes and timeless tales."
    - ""
    - "&2&lFANTASY SET BONUS"
    - "&2* Deal 25% more damage to all enemies"
    - "&2* Fantasy Trap Ability"
    - "&7&o(Requires all four Fantasy set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&2&lEnchanted Helmet&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&2&lMythic Platemail&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&2&lLost Legwear&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&2&lAdventurer's Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&2&lArcane Blade&r"
  lore:
    - "&2Wield the mysteries of magic with the Arcane Blade, a sword infused with ancient and powerful spells."
    - ""
    - "&2&lFANTASY WEAPON BONUS"
    - "&2* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Fantasy set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects: []
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
