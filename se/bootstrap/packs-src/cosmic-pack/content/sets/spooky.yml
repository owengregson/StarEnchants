# Spooky — eerie diamond set: defensive bonus plus the Gravedigger weapon.
display: "&6&lSpooky"
description: "&6Don the Spooky set and embrace the eerie whispers of the night, cloaked in mystery and shadow."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&6&l** Spooky SET EQUIPPED &6&l**\n"
remove-message: "\n&7&l** Spooky SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&6Don the Spooky set and embrace the eerie whispers of the night, cloaked in mystery and shadow."
    - ""
    - "&6&lSPOOKY SET BONUS"
    - "&6* Deal 20% more damage to all enemies."
    - "&6* Enemies deal 25% less damage to you."
    - "&6* Scarecrow Ability"
    - ""
    - "&6&lSCARECROW"
    - "&6* Chance to replace your enemy's helmet with a pumpkin for 3 seconds"
    - "&7&o(Requires all four Spooky set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&6&lHaunted Headgear&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&6&lMysterious Platemail&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&6&lOminous Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&6&lSpooky Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&6&lGravedigger&r"
  lore:
    - "&6Unearth the power of the dead with the Gravedigger, a weapon that delves into the shadows and stirs the restless spirits."
    - ""
    - "&6&lSPOOKY WEAPON BONUS"
    - "&6* Deal 10% more damage to all enemies"
    - "&7&o(Requires all four Spooky set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 25 } }
  # Scarecrow — 5% on hit (30s cd, players): pumpkin-head the victim for 3s. Removing the helmet drops their set
  # below complete, so their helmet's set bonus deactivates for the window. Death/quit stay normal — the real
  # helmet drops / is kept (a holy white scroll still applies), never the pumpkin.
  - on: armor
    trigger: ATTACK
    chance: 15
    cooldown: 600
    condition: "%victim.type% == PLAYER"
    effects:
      - { EQUIP_SWAP: { slot: helmet, material: CARVED_PUMPKIN, duration: 60, who: "@Victim" } }
      - { MESSAGE: { channel: title, text: "&6&l** SCARECROW **", subtitle: "&7from &c{ATTACKER}", who: "@Victim" } }
      - { MESSAGE: { text: "&6&l** SCARECROW &r&7[&f{VICTIM}&7] &r&6&l**" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
      - { POTION: { effect: BLINDNESS, level: 2, duration: 100, who: "@Victim" } }
      - { POTION: { effect: SLOWNESS, level: 1, duration: 100, who: "@Victim" } }
