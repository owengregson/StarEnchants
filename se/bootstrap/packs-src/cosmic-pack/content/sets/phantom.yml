# Phantom — wraith-themed diamond set; offensive buffs and a haunting scythe.
display: "&c&lPhantom"
description: "&cMove like a wraith through the shadows with the Phantom set, ethereal and elusive as the night."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&c&l** Phantom SET EQUIPPED &c&l**\n"
remove-message: "\n&7&l** Phantom SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&cMove like a wraith through the shadows with the Phantom set, ethereal and elusive as the night."
    - ""
    - "&c&lPHANTOM SET BONUS"
    - "&c* Deal 25% more damage to all enemies"
    - "&c* Ghostly Rush Passive Ability"
    - ""
    - "&c&lGHOSTLY RUSH"
    - "&c* Permanent Haste I, Strength III, Speed IV"
    - "&c* Cannot use Soul Enchantments"
    - "&7&o(Requires all four Phantom set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&c&lSpectral Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&c&lEthereal Cloak&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&c&lWraith Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&c&lShadow Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&c&lGhastly Scythe&r"
  lore:
    - "&cReap the souls of the fallen with the Ghastly Scythe, a weapon shrouded in spectral mist and haunting whispers."
    - ""
    - "&c&lPHANTOM WEAPON BONUS"
    - "&c* Deal 10% more damage to all enemies"
    - "&7&o(Requires all four Phantom set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  # Ghostly Rush (permanent) — Haste I + Strength III + Speed IV while the full set is worn (driver-maintained).
  - on: armor
    trigger: [PASSIVE]
    chance: 100
    effects:
      - { POTION: { effect: FAST_DIGGING, level: 1, duration: 200, who: "@Self" } }   # Haste I
      - { POTION: { effect: INCREASE_DAMAGE, level: 3, duration: 200, who: "@Self" } }  # Strength III
      - { POTION: { effect: SPEED, level: 4, duration: 200, who: "@Self" } }            # Speed IV
  # Soul-tier lockout — re-armed every 2s (3s TTL) so the wearer's SOUL-group enchants never activate while worn
  # (every soul-tier enchant carries group: soul). Lapses ~3s after the set is removed.
  - on: armor
    trigger: REPEATING
    repeat: 40
    chance: 100
    effects:
      - { SUPPRESS: { scope: GROUP, key: soul, duration: 60, who: "@Self" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
