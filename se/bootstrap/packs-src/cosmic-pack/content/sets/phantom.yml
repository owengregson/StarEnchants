# Phantom — wraith-themed diamond set; offensive buffs and a haunting scythe.
display: "&c&lPhantom"
description: "Move like a wraith and strike with spectral force while wearing the set."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&c&l** Phantom SET EQUIPPED &c&l**\n"
remove-message: "\n&7&l** Phantom SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - ""
    - "&c&lPHANTOM SET BONUS"
    - "&c* Deal 25% more damage to all enemies"
    - "&c* Ghostly Rush Passive Ability"
    - "&7&o(Requires all four Phantom set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&c&lSpectral Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&c&lEthereal Cloak&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&c&lWraith Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&c&lShadow Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&c&lGhastly Scythe&r"
  lore:
    - "&cReap the souls of the fallen with the"
    - "&cGhastly Scythe, a weapon shrouded"
    - "&cin spectral mist and haunting whispers."
    - ""
    - "&c&lPHANTOM WEAPON BONUS"
    - "&c* Deal 10% more damage to all enemies"
    - "&7&o(Requires all four Phantom set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { POTION: { effect: SPEED, level: 4, duration: 100, who: "@Self" } }
      - { POTION: { effect: INCREASE_DAMAGE, level: 1, duration: 100, who: "@Self" } }
      - { POTION: { effect: FAST_DIGGING, level: 2, duration: 100, who: "@Self" } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
