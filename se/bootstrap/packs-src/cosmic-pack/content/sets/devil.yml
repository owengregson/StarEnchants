# Devil — diamond infernal set; defense reduction + a heavy-hitting weapon.
display: "&4&lDevil"
description: "&4Command the inferno with the Devil set, born from the flames of the underworld."
complete: 4
# Announce on a completion transition (Cosmic Pack default; set name + colour authored verbatim).
announce: true
equip-message: "\n&4&l** Devil SET EQUIPPED &4&l**\n"
remove-message: "\n&7&l** Devil SET REMOVED **\n"
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&4Command the inferno with the Devil set, born from the flames of the underworld."
    - ""
    - "&4&lDEVIL SET BONUS"
    - "&4* Deal 25% more damage to all enemies"
    - "&4* Enemies deal 20% less damage to you"
    - "&4* Hell's Kitchen Ability"
    - ""
    - "&4&lHELL'S KITCHEN"
    - "&4* Chance to engulf your victim in Hell's Kitchen, causing them to take 35% more damage while in the area"
    - "&7&o(Requires all four Devil set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&4&lFlaming Helmet&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&4&lHellforged Chestplate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&4&lInfernal Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&4&lDevil's Claws&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&4&lDevil's Cleaver&r"
  lore:
    - "&4Unleash the inferno with the Devil's Cleaver, a blade forged in the flames of the underworld."
    - ""
    - "&4&lDEVIL WEAPON BONUS"
    - "&4* Deal 5% more damage to all enemies"
    - "&7&o(Requires all four Devil set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 20 } }
  # Hell's Kitchen (permanent) — a single netherrack block forms directly beneath the wearer's foot as they move
  # (self-reverting, so the ground returns). The footprint replaces ONLY solid ground, so jumping can't scaffold.
  - on: armor
    trigger: REPEATING
    repeat: 5
    chance: 100
    effects:
      - { TEMP_BLOCK: { shape: FOOTPRINT, material: NETHERRACK, radius: 0, dy: -1, ticks: 40, airOnly: false, who: "@Self" } }
  # Hell's Kitchen — 15% on hit (30s cd): lay a 7x7 hellish MAGMA floor under the victim for 5s (only over solid
  # ground), with flame + a blaze roar, and stake out a wearer-owned hellfire zone over it (read by %victim.inzone%
  # below). The zone also suppresses the magma's HOT_FLOOR burn, so the floor scorches the scene, not the health,
  # of anyone caught standing on it.
  - on: armor
    trigger: ATTACK
    chance: 15
    cooldown: 600
    effects:
      - { TEMP_BLOCK: { shape: FOOTPRINT, material: MAGMA_BLOCK, radius: 3, dy: -1, ticks: 100, airOnly: false, who: "@Victim" } }
      - { MARK_ZONE: { radius: 4.5, duration: 100, who: "@Victim" } }
      - { PARTICLE: { particle: FLAME, count: 40 } }
      - { SOUND: { sound: ENTITY_BLAZE_SHOOT } }
      - { MESSAGE: { channel: title, text: "&4&l** HELL'S KITCHEN **", subtitle: "&7from &c{ATTACKER}", who: "@Victim" } }
      - { MESSAGE: { text: "&4&l** HELL'S KITCHEN &r&7[&f{VICTIM}&7] &r&4&l**" } }
  # While striking an enemy who is standing in one of our active hellfire zones, hit them for +35% (the floor
  # lasts 5s, so this rides on top of the proc above whenever they linger in the inferno).
  - on: armor
    trigger: ATTACK
    chance: 100
    condition: "%victim.inzone%"
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 35 } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
