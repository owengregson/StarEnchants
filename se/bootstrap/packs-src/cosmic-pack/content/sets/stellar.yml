# Stellar — cosmic diamond set; absorption shield on defense, Rift Blade weapon.
display: "&5&lStellar"
description: "Harness the cosmos to outmaneuver any foe while wearing the set."
complete: 4
armor:
  enchants:
    PROTECTION: 4
    UNBREAKING: 3
  lore:
    - "&5Harness the power of the cosmos with the"
    - "&5Stellar Set, transcending space and time"
    - "&5to outmaneuver any foe."
    - ""
    - "&5&lSTELLAR SET BONUS"
    - "&5* Deal 20% more damage to all enemies"
    - "&5* Dimensional Shift Passive Ability"
    - "&7&o(Requires all four Stellar set items.)"
  pieces:
    helmet:     { material: DIAMOND_HELMET,     name: "&5&lQuantum Hood&r" }
    chestplate: { material: DIAMOND_CHESTPLATE, name: "&5&lPhase Plate&r" }
    leggings:   { material: DIAMOND_LEGGINGS,   name: "&5&lWarp Leggings&r" }
    boots:      { material: DIAMOND_BOOTS,      name: "&5&lBlink Boots&r" }
weapon:
  enchants:
    SHARPNESS: 5
    UNBREAKING: 3
  material: DIAMOND_SWORD
  name: "&5&lRift Blade&r"
  lore:
    - "&5Wield the Rift Blade, a sword that tears"
    - "&5through dimensions, striking with"
    - "&5unpredictable swiftness."
    - ""
    - "&5&lSTELLAR WEAPON BONUS"
    - "&5* Deal 10% more damage to all enemies"
    - "&7&o(Requires all four Stellar set items.)"
# Behaviours: on:armor fires while the set is complete; on:weapon also requires the set weapon held.
bonuses:
  - on: armor
    trigger: DEFENSE
    chance: 100
    effects:
      - { POTION: { effect: ABSORPTION, level: 5, duration: 100, who: "@Self" } }
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 5 } }
  - on: weapon
    trigger: ATTACK
    chance: 100
    effects:
      - { DAMAGE_MOD: { side: attack, mode: add, amount: 30 } }
