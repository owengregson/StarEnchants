# Transmog Scroll — the Elite-Enchantments LIKENESS (docs/v3-directives.md §I). Drag onto enchanted gear to
# ORGANISE its enchants by rarity and stamp the enchant count into the name. Real Minecraft enchants render
# above the lore by the client (so they sit on top); custom enchants sort highest-weight tier first.
# Re-applicable — a second apply re-sorts and REPLACES the count (never stacks it). Only the name/lore/material
# differ from the default item; the mechanic is global. reload with /se reload.
type: transmog-scroll

material: PAPER
name: "&c&lTransmog Scroll"
# Authored lore lines auto-wrap at config lore.item-wrap.
lore:
  - "&eOrganizes enchants by &f&nrarity&r&e on your item and adds the &denchant &bcount &eto the name."
  - "&7Drag n' Drop on an item to apply."
# Appended to the gear's display name when transmogged; {COUNT} = the item's total enchant count.
name-suffix: "&r &d[&b&l&n{COUNT}&r&d]"
