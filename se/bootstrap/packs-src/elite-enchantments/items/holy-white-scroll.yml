# Holy White Scroll — the Elite-Enchantments LIKENESS (docs/v3-directives.md §I). Drag onto a piece of gear
# to APPLY a one-shot keep-on-death marker to THAT item; when you die the marked item is kept and the marker
# consumed. An item holds only ONE applied item at a time (holy white scroll / white scroll / blocktrak /
# mobtrak / soultrak). Only the name/lore/material differ from the default item; the mechanic is global.
# reload with /se reload.
type: holy-white-scroll

material: MAP
name: "&6&lHoly White Scroll"
# Authored lore lines auto-wrap at config lore.item-wrap.
lore:
  - "&7Apply this to an item to protect it from being lost when you die."
  - ""
  - "&7The marked item is kept on death — consumed once it saves you."
# Each apply rolls a success in [min-success, max-success] (each 0–100). On a failed roll the scroll is spent
# without protecting (it never destroys gear). 100/100 = always succeeds.
min-success: 100
max-success: 100
