# White Scroll — the Elite-Enchantments LIKENESS (docs/v3-directives.md §I). Drag onto gear to PROTECT it from
# enchant destruction: it stamps a one-shot guard so the NEXT failed enchant apply spares the item instead of
# shattering it. An item holds only ONE applied item at a time (white scroll / holy white scroll / blocktrak /
# mobtrak / soultrak). Placeholders: {SUCCESS}/{FAILURE} = the rolled apply odds. Only the name/lore differ
# from the default item; the mechanic is global. Lore auto-wraps.
type: white-scroll

material: PAPER
name: "&f&lWhite Scroll"
lore:
  - "&a{SUCCESS}% &7Success Rate"
  - "&c{FAILURE}% &7Failure Rate"
  - ""
  - "&7Protects an item — a failed enchant will spare it once instead of destroying it."
# Each minted scroll rolls an apply-success % in [min-success, max-success]; on a failed roll the scroll is
# consumed WITHOUT protecting (it never destroys the gear). 100/100 = always succeeds.
min-success: 100
max-success: 100
