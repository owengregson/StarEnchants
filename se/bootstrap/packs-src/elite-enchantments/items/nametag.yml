# Item Nametag (docs/v3-directives.md §I) — drag onto gear, then type the new name in chat; the name is
# rejected if it contains a blacklisted word (matched case-insensitively as a substring of the colour-
# stripped name). One physical item per file; reload with /se reload. Result messages live in lang.yml
# (scroll.nametag.*).
type: nametag

material: NAME_TAG
name: "&bItem Nametag"
lore:
  - "&7Drag onto gear, then type the"
  - "&7new name in chat."
# Words a renamed item may not contain (case-insensitive substring match). Empty = allow any name.
blacklist: []
