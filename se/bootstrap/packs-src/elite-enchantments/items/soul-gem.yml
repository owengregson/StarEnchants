# The soul gem — a DISTINCT item you right-click to toggle soul mode on/off. Souls accrue on ANY kill
# (souls-per-kill, optionally per-mob) regardless of soul mode; soul mode is the "spend switch" that lets
# soul-cost enchants and the REMOVE_SOULS effect consume them. Drag one gem onto another to combine (their
# souls sum into a new gem); /splitsouls <amount> (alias of /se split) carves souls into a new gem.
# This is the Elite-Enchantments LIKENESS: the live soul count rides in the NAME. Everything below the
# name/lore is the global mechanic (identical to the default item); reload with /se reload.
type: soul-gem
material: EMERALD
# (soul_amt) = the live count, (soul_amt_color) = its tier colour; both re-render on every change. The brace
# spellings {AMOUNT}/{SOUL-COLOR} are equivalent. Authored lore lines auto-wrap (config lore.item-wrap).
name: "&c&lSoul Gem [&r(soul_amt_color)&n&l(soul_amt)&r&c&l]"
lore:
  - "&7Right-click to toggle soul mode, letting soul-cost enchants spend from this gem."
  - ""
  - "&7Use &f/splitsouls <amount>&7 to carve souls off into a new gem."
  - "&7Stack one gem onto another to combine their souls."

# Acquisition (deposit on any kill).
souls-per-kill: 1
# Optional per-mob overrides (EntityType name -> amount); anything not listed uses souls-per-kill.
souls-per-mob:
  WITHER: 100
  ENDER_DRAGON: 250
  PLAYER: 10

# Soul-colour tiers for the (soul_amt_color)/{SOUL-COLOR} placeholder (min count -> &colour); highest wins.
soul-colors:
  1: "&f"
  64: "&a"
  256: "&b"
  1024: "&d"
# The colour shown below every tier (an empty gem).
empty-soul-color: "&7"

# Sounds: a master on/off plus namespaced sound keys (work on every supported version).
sounds:
  enabled: true
  activate: "entity.player.levelup"
  deactivate: "ui.button.click"
  combine: "block.anvil.use"

# Particles (tokens, alias-resolved). on-activate/on-deactivate spawn at the toggle; `active` is the
# while-active aura spawned each tick at every player in soul mode. Multiple tokens per knob are allowed.
particles:
  active: [SOUL]
  on-activate: [SOUL_FIRE_FLAME, HAPPY_VILLAGER]
  on-deactivate: [SMOKE]

# Messages ({AMOUNT} = remaining souls on soul use).
