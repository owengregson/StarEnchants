name: StarEnchants
version: '${version}'
main: bootstrap.StarEnchantsPlugin
api-version: '1.17'
# Folia-correct: all entity/world/timer work goes through the platform Scheduling abstraction.
folia-supported: true
description: Cross-version Paper/Folia enchantments and armor engine for Minecraft 1.8 and 1.17.1-26.1.2.
authors: [StarEnchants]
# Optional integrations (§N, docs/decisions/0027): every bridge is bundled in THIS jar and active out of the
# box when the plugin is present — none is required. softdepend = "load after these if installed" so their
# APIs/services are ready when StarEnchants enables; it never forces any of them to be present.
softdepend: [Mental, WorldGuard, Vault, Towny, Lands, SuperiorSkyblock2, Factions, PlaceholderAPI,
  GrimAC, NoCheatPlus, Vulcan, Matrix, Spartan, mcMMO, MythicMobs, ItemsAdder, Oraxen]
commands:
  se:
    description: StarEnchants admin command.
    usage: |-
      /se reload [--dry-run] — rebuild content
      /se enchant <key> [level] — apply an enchant to the held item
      /se crystal <key> — apply a crystal to the held item
    permission: starenchants.admin
permissions:
  starenchants.admin:
    description: Administer StarEnchants (reload content, operator GUI, /se).
    default: op
  starenchants.use:
    description: Open the player-facing StarEnchants menu (/enchants).
    default: true
