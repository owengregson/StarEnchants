# Soul Reaper — drink in the life of the slain, mending body and blade.
display: "&8Soul Reaper"
description: "Drain life from your fallen foes to heal yourself."
trigger: KILL
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 60, 2: 75, 3: 90 }
scale:
  heal: { 1: 3, 2: 5, 3: 8 }
  crits: { 1: 6, 2: 8, 3: 12 }
effects:
  - { HEAL: { amount: $heal } }
  - { PARTICLE: { particle: CRIT, count: $crits } }
levels:
  3:
    effects+:
      - { SOUND: { sound: ENTITY_PLAYER_LEVELUP, volume: 1, pitch: 1 } }
      - { MESSAGE: { text: "&8Their soul is yours." } }
