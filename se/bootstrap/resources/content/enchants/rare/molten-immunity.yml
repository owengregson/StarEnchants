# Molten Immunity — walk away from the lava unscathed. A FIRE enchant (fires on fire/lava
# damage): it EXTINGUISHes the wearer, soaks the burn (REDUCE_DAMAGE / FLAT_REDUCE feed the
# additive defense fold §6.1) and grants Fire Resistance. The top tier cancels the hit outright
# (CANCEL — used sparingly, here behind a high tier and a cooldown). All self-effects are @Self.
display: "&cMolten Immunity"
description: "Walk away from the lava unscathed."
trigger: FIRE
applies-to: [ARMOR]
group: defense
levels:
  1:
    chance: 40
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { REDUCE_DAMAGE: { percent: 30 } }
      - { POTION: { effect: FIRE_RESISTANCE, amplifier: 0, duration: 80, who: "@Self" } }
  2:
    chance: 55
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { REDUCE_DAMAGE: { percent: 50 } }
      - { FLAT_REDUCE: { amount: 2 } }
      - { POTION: { effect: FIRE_RESISTANCE, amplifier: 0, duration: 140, who: "@Self" } }
  3:
    chance: 70
    cooldown: 200
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { CANCEL: {} }
      - { POTION: { effect: FIRE_RESISTANCE, amplifier: 0, duration: 200, who: "@Self" } }
