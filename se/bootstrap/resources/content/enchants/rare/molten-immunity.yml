# Molten Immunity — walk away from the lava unscathed. A FIRE enchant (fires on fire/lava
# damage): it EXTINGUISHes the wearer, soaks the burn (DAMAGE_MOD defense add/flat feed the
# additive defense fold §6.1) and grants Fire Resistance. The top tier cancels the hit outright
# (CANCEL — used sparingly, here behind a high tier and a cooldown). All self-effects are @Self.
display: "&cMolten Immunity"
description: "Walk away from the lava unscathed."
trigger: FIRE
applies-to: [ARMOR]
group: defense
levels:
  1:
    chance: 40
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 30 } }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 80, who: "@Self" } }
  2:
    chance: 55
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 50 } }
      - { DAMAGE_MOD: { side: defense, mode: flat, amount: 2 } }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 140, who: "@Self" } }
  3:
    chance: 70
    cooldown: 200
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { CANCEL: {} }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 200, who: "@Self" } }
