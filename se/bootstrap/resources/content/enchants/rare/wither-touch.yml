# Wither Touch — afflict the foe with decay on hit. WITHER debuff appended :@Victim.
display: "&0Wither Touch"
description: "Wither the enemy you strike."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 20, 2: 28, 3: 36 }
scale:
  amp: { 1: 1, 2: 1, 3: 2 }
  dur: { 1: 60, 2: 80, 3: 100 }
  motes: { from: 6, step: 4 }
effects:
  - { POTION: { effect: WITHER, level: $amp, duration: $dur, who: "@Victim" } }
  - { PARTICLE: { particle: SOUL, count: $motes } }
levels:
  3:
    cooldown: 0
    effects+:
      - { MESSAGE: { text: "&0Decay spreads from your touch!" } }
