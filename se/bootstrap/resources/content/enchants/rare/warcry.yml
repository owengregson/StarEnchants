# Warcry — bellow a battle cry on right-click, buffing yourself. An activated INTERACT_RIGHT
# ability (held-item trigger, §3.7) gated by a cooldown so it cannot be spammed. Every POTION
# names a version-volatile handle resolved to an interned id at compile time (§9) and defaults
# to the @Self target (the wielder), so no victim is needed for a held-item activation.
display: "&6Warcry"
description: "Bellow a battle cry to buff yourself."
trigger: INTERACT_RIGHT
applies-to: [WEAPON]
group: utility
levels:
  1:
    chance: 100
    cooldown: 200
    effects:
      - { POTION: { effect: STRENGTH, level: 1, duration: 120, who: "@Self" } }
      - { SOUND: { sound: ENTITY_WITHER_SPAWN, volume: 1, pitch: 1 } }
      - { MESSAGE: { text: "&6Warcry!" } }
  2:
    chance: 100
    cooldown: 180
    effects:
      - { POTION: { effect: STRENGTH, level: 2, duration: 120, who: "@Self" } }
      - { POTION: { effect: SPEED, level: 1, duration: 120, who: "@Self" } }
      - { SOUND: { sound: ENTITY_WITHER_SPAWN, volume: 1, pitch: 1 } }
      - { MESSAGE: { text: "&6Warcry!" } }
  3:
    chance: 100
    cooldown: 160
    effects:
      - { POTION: { effect: STRENGTH, level: 2, duration: 160, who: "@Self" } }
      - { POTION: { effect: SPEED, level: 2, duration: 160, who: "@Self" } }
      - { POTION: { effect: ABSORPTION, level: 2, duration: 160, who: "@Self" } }
      - { PARTICLE: { particle: FLAME, count: 30 } }
      - { SOUND: { sound: ENTITY_WITHER_SPAWN, volume: 1, pitch: 1 } }
