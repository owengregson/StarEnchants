# Bloodspoils — every kill lines your pockets with coin.
display: "&6Bloodspoils"
description: "Earn coin for every enemy you slay."
trigger: KILL
applies-to: [SWORD, AXE]
group: combat
levels:
  1:
    chance: 50
    effects:
      - { RUN_COMMAND: { command: "eco give %player% 25" } }
      - { ACTIONBAR: { text: "&6+25 coins" } }
  2:
    chance: 65
    effects:
      - { RUN_COMMAND: { command: "eco give %player% 50" } }
      - { ACTIONBAR: { text: "&6+50 coins" } }
  3:
    chance: 80
    effects:
      - { RUN_COMMAND: { command: "eco give %player% 100" } }
      - { ACTIONBAR: { text: "&6+100 coins" } }
      - { SOUND: { sound: ENTITY_PLAYER_LEVELUP, volume: 1, pitch: 2 } }
