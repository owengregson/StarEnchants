# Sunder — rend the foe's armour apart with a heavy blow. DAMAGE_ARMOR defaults to @Victim.
display: "&6Sunder"
description: "Rend the armour of the enemy you strike."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 30, 2: 40, 3: 50 }
scale:
  shred: { 1: 1, 2: 2, 3: 3 }
effects:
  - { DAMAGE_ARMOR: { amount: $shred, who: "@Victim" } }
levels:
  2:
    effects+:
      - { ADD_DAMAGE: { percent: 10 } }
  3:
    cooldown: 0
    effects+:
      - { ADD_DAMAGE: { percent: 20 } }
      - { SOUND: { sound: BLOCK_ANVIL_LAND, volume: 1, pitch: 1 } }
      - { MESSAGE: { text: "&6Their armour is sundered!" } }
