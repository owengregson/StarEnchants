# Lifebloom (§B REPEATING) — while worn, a healing pulse beats every few seconds. REPEATING arms one
# entity-owned timer (Folia-correct, follows the player across regions) that fires on the `repeat` period and
# is cancelled when the armour is removed or you quit. Unlike PASSIVE (a single apply/remove around the equip
# change), this RE-FIRES on each tick of the period — so it runs the full gate sequence (chance/cooldown/
# condition) every pulse. `repeat` is the period in ticks (100 = 5 seconds).
display: "&aLifebloom"
description: "While worn, pulses healing Regeneration every few seconds."
trigger: REPEATING
repeat: 100
applies-to: [CHESTPLATE]
group: utility
levels:
  1:
    chance: 100
    effects:
      - { POTION: { effect: REGENERATION, level: 1, duration: 60, who: "@Self" } }
  2:
    chance: 100
    effects:
      - { POTION: { effect: REGENERATION, level: 2, duration: 60, who: "@Self" } }
