# Last Stand — dig in when the end is near. A DEFENSE enchant gated on the wearer's health
# (%actor.health%, a registered numeric fact §3.4): when a blow drops the wearer to the level's
# threshold it softens the hit (DAMAGE_MOD defense/add, additive defense bucket §6.1) and buffs the wearer
# with Resistance and Absorption (POTION defaults to @Self).
tier: epic
display: "&4Last Stand"
description: "Dig in when the end is near."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
levels:
  1:
    chance: 100
    cooldown: 400
    condition: "%actor.health% <= 6"
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 40 } }
      - { POTION: { effect: DAMAGE_RESISTANCE, level: 1, duration: 80, who: "@Self" } }
  2:
    chance: 100
    cooldown: 360
    condition: "%actor.health% <= 7"
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 55 } }
      - { POTION: { effect: DAMAGE_RESISTANCE, level: 2, duration: 100, who: "@Self" } }
      - { POTION: { effect: ABSORPTION, level: 1, duration: 120, who: "@Self" } }
  3:
    chance: 100
    cooldown: 320
    condition: "%actor.health% <= 8"
    effects:
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 70 } }
      - { POTION: { effect: DAMAGE_RESISTANCE, level: 2, duration: 140, who: "@Self" } }
      - { POTION: { effect: ABSORPTION, level: 2, duration: 160, who: "@Self" } }
