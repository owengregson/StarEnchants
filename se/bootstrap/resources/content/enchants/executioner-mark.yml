# Executioner's Mark — brand the slain with a final, devastating blast.
tier: legendary
display: "&cExecutioner's Mark"
description: "Mark your kills for a deadly finishing blast."
trigger: KILL
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 20, 2: 30, 3: 40 }
cooldown: 100
scale:
  pcount: { 1: 10, 2: 14, 3: 18 }
effects:
  - { LIGHTNING: { damage: 0 } }
  - { PARTICLE: { particle: FLAME, count: $pcount } }
levels:
  2:
    effects:
      - { LIGHTNING: { damage: 0 } }
      - { EXPLODE: { power: 1, breakBlocks: false } }
      - { PARTICLE: { particle: FLAME, count: 14 } }
  3:
    effects:
      - { LIGHTNING: { damage: 0 } }
      - { EXPLODE: { power: 2, breakBlocks: false } }
      - { PARTICLE: { particle: FLAME, count: 18 } }
      - { SOUND: { sound: BLOCK_ANVIL_LAND, volume: 1, pitch: 1 } }
      - { MESSAGE: { channel: title, text: "&cExecuted!", subtitle: "", fadeIn: 10, stay: 40, fadeOut: 10 } }
