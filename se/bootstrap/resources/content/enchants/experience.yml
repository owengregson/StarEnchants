# Experience — every block you break feeds your levels.
display: "&aExperience"
description: "Gain bonus XP as you mine."
trigger: MINE
applies-to: [PICKAXE, SHOVEL, AXE, HOE]
group: mining
levels:
  1: { chance: 100, effects: ["GIVE_EXP:3"] }
  2: { chance: 100, effects: ["GIVE_EXP:6"] }
  3: { chance: 100, effects: ["GIVE_EXP:10", "SOUND:ENTITY_PLAYER_LEVELUP:1:1"] }
