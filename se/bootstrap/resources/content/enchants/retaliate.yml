# Retaliate — strike back at whoever hit you. A DEFENSE enchant that deals reflected DAMAGE
# to the attacker. DAMAGE defaults to @Victim, so on a defender-side trigger it explicitly
# names @Attacker — the entity that just hit the wearer.
tier: rare
display: "&cRetaliate"
description: "Strike back at whoever hits you."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
max-level: 3
chance: { 1: 30, 2: 40, 3: 50 }
scale:
  dmg: { from: 3, step: 2 }
effects:
  - { DAMAGE: { amount: $dmg, who: "@Attacker" } }
levels:
  3:
    effects+:
      - { VELOCITY: { mode: away, strength: 0.8, who: "@Attacker" } }
