# Concussion — daze the foe with nausea and knock them reeling backward.
display: "&eConcussion"
description: "Daze and stagger the enemy you strike."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 20, 2: 28, 3: 36 }
scale:
  dur: { from: 80, step: 40 }
  kb: { from: 1, step: 1 }
effects:
  - { POTION: { effect: NAUSEA, amplifier: 0, duration: $dur, who: "@Victim" } }
  - { VELOCITY: { mode: away, strength: $kb, who: "@Victim" } }
levels:
  3:
    cooldown: 0
    effects+:
      - { MESSAGE: { text: "&eThe world spins for your foe!" } }
