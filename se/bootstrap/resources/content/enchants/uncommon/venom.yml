# Venom — inject lingering poison into the foe you strike. POTION debuffs append :@Victim.
display: "&2Venom"
description: "Poison your foe on hit."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 25, 2: 35, 3: 45 }
scale:
  amp: { 1: 0, 2: 1, 3: 1 }
  dur: { 1: 60, 2: 80, 3: 100 }
effects:
  - { POTION: { effect: POISON, amplifier: $amp, duration: $dur, who: "@Victim" } }
levels:
  3:
    cooldown: 0
    effects+:
      - { MESSAGE: { text: "&2Venom courses through your blade!" } }
