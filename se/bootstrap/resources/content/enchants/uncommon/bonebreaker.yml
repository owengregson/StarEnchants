# Bonebreaker — shatter armour and weaken the foe with a crushing blow.
display: "&fBonebreaker"
description: "Crush armour and weaken your target."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 25, 2: 35, 3: 45 }
scale:
  armor: { 1: 1, 2: 2, 3: 3 }
  amp: { 1: 0, 2: 0, 3: 1 }
  dur: { 1: 60, 2: 80, 3: 100 }
effects:
  - { DURABILITY: { amount: $armor, target: armor, mode: damage, who: "@Victim" } }
  - { POTION: { effect: WEAKNESS, amplifier: $amp, duration: $dur, who: "@Victim" } }
levels:
  3:
    cooldown: 0
    effects+:
      - { SOUND: { sound: BLOCK_ANVIL_LAND, volume: 1, pitch: 1 } }
      - { MESSAGE: { text: "&fBones crack under your strike!" } }
