# Fortify — gain Resistance when you take a hit. A DEFENSE enchant whose POTION effect names a
# version-volatile handle (DAMAGE_RESISTANCE → resistance) resolved to an interned id at load time
# through the same cross-version resolver the runtime uses (§9) — so the same file works on every
# supported version. POTION defaults to the @Self target (the wearer).
display: "&9Fortify"
description: "Gain Resistance when struck."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
group: defense
max-level: 3
chance: { 1: 40, 2: 55, 3: 70 }
scale:
  amp: { 1: 0, 2: 1, 3: 1 }
  dur: { 1: 60, 2: 80, 3: 100 }
effects:
  - { POTION: { effect: DAMAGE_RESISTANCE, amplifier: $amp, duration: $dur } }
