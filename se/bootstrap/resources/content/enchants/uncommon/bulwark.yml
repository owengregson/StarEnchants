# Bulwark — soften incoming blows.
display: "&9Bulwark"
description: "Shrug off incoming blows."
trigger: DEFENSE
applies-to: [ARMOR]
group: defense
max-level: 3
chance: { 1: 30, 2: 40, 3: 55 }
scale:
  reduce: { 1: 10, 2: 18, 3: 25 }
effects:
  - { DAMAGE_MOD: { side: defense, mode: add, amount: $reduce } }
levels:
  3:
    effects+:
      - { POTION: { effect: DAMAGE_RESISTANCE, level: 1, duration: 40, who: "@Self" } }
