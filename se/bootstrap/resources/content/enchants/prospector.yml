# Prospector — strike the earth and turn up bonus experience as you mine.
tier: common
display: "&eProspector"
description: "Unearth bonus XP from the blocks you break."
trigger: MINE
applies-to: [PICKAXE, SHOVEL]
group: mining
levels:
  1:
    chance: 30
    effects:
      - { MODIFY_EXP: { amount: 2 } }
      - { PARTICLE: { particle: HAPPY_VILLAGER, count: 4 } }
  2:
    chance: 40
    effects:
      - { MODIFY_EXP: { amount: 4 } }
      - { PARTICLE: { particle: HAPPY_VILLAGER, count: 6 } }
  3:
    chance: 50
    effects:
      - { MODIFY_EXP: { amount: 7 } }
      - { PARTICLE: { particle: HAPPY_VILLAGER, count: 8 } }
      - { SOUND: { sound: ENTITY_PLAYER_LEVELUP, volume: 1, pitch: 1 } }
