# Frostguard — chill whoever strikes you. A DEFENSE enchant that softens the blow (REDUCE_DAMAGE,
# additive defense bucket §6.1) and slows the attacker (POTION:SLOWNESS → @Attacker, valid on a
# defender-side trigger). The top tier also briefly blinds them.
display: "&bFrostguard"
description: "Chill whoever strikes you."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
group: defense
levels:
  1: { chance: 30, effects: ["REDUCE_DAMAGE:8", "POTION:SLOWNESS:0:40:@Attacker"] }
  2: { chance: 40, effects: ["REDUCE_DAMAGE:14", "POTION:SLOWNESS:1:60:@Attacker"] }
  3: { chance: 50, effects: ["REDUCE_DAMAGE:20", "POTION:SLOWNESS:1:80:@Attacker", "POTION:BLINDNESS:0:40:@Attacker"] }
