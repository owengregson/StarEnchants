  3: { chance: 50, cooldown: 0, effects: ["DAMAGE_ARMOR:3:@Victim", "ADD_DAMAGE:20", "SOUND:BLOCK_ANVIL_LAND:1:1", "MESSAGE:&6Their armour is sundered!"] }
