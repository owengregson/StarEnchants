# Tax — every hit skims coin from your victim's purse. An ATTACK enchant using TAKE_MONEY against
# the @Victim (the EE/EA "tax"/"trade" family). A no-op on a server with no economy provider; the
# withdraw is best-effort, taking only what the victim can afford. Money moves on the global thread.
display: "&6Tax"
description: "Skim coins from those you strike."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
levels:
  1: { chance: 25, effects: ["TAKE_MONEY:25:@Victim"] }
  2: { chance: 35, effects: ["TAKE_MONEY:50:@Victim"] }
  3: { chance: 45, effects: ["TAKE_MONEY:100:@Victim", "MESSAGE:&6Taxed!"] }
