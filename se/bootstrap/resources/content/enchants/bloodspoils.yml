# Bloodspoils — every kill lines your pockets with coin.
display: "&6Bloodspoils"
description: "Earn coin for every enemy you slay."
trigger: KILL
applies-to: [SWORD, AXE]
group: combat
levels:
  1: { chance: 50, effects: ["RUN_COMMAND:eco give %player% 25", "ACTIONBAR:&6+25 coins"] }
  2: { chance: 65, effects: ["RUN_COMMAND:eco give %player% 50", "ACTIONBAR:&6+50 coins"] }
  3: { chance: 80, effects: ["RUN_COMMAND:eco give %player% 100", "ACTIONBAR:&6+100 coins", "SOUND:ENTITY_PLAYER_LEVELUP:1:2"] }
