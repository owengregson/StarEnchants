# Bloodlust (§B HELD lifecycle, ADR-0022) — while you HOLD the weapon you are filled with Strength. The buff
# turns ON the moment the weapon is equipped (START) and is REMOVED the moment you switch away (STOP) — the EE
# start/stop lifecycle the engine otherwise lacks. Authored as a single POTION line: the LifecycleDriver applies
# it on equip and clears it on unequip, so the long duration only matters if you never switch — STOP guarantees
# it never lingers after the sword is put away. No chance/cooldown gate applies to a maintained buff.
tier: rare
display: "&cBloodlust"
description: "While held, fills the wielder with Strength."
trigger: HELD
applies-to: [SWORD, AXE]
group: utility
levels:
  1:
    chance: 100
    effects:
      - { POTION: { effect: STRENGTH, level: 1, duration: 1000000, who: "@Self" } }
  2:
    chance: 100
    effects:
      - { POTION: { effect: STRENGTH, level: 2, duration: 1000000, who: "@Self" } }
  3:
    chance: 100
    effects:
      - { POTION: { effect: STRENGTH, level: 2, duration: 1000000, who: "@Self" } }
      - { POTION: { effect: SPEED, level: 1, duration: 1000000, who: "@Self" } }
