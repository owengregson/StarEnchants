# Cleanse — wash away afflictions when you take a hit. A DEFENSE enchant: lower tiers strip a
# single named debuff (REMOVE_POTION, a version-volatile handle resolved at compile time §9),
# the top tier CUREs everything. Both default to @Self, so the wearer is cleansed.
display: "&fCleanse"
description: "Wash away afflictions when struck."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
group: defense
levels:
  1: { chance: 25, effects: ["REMOVE_POTION:SLOWNESS:@Self"] }
  2: { chance: 35, effects: ["REMOVE_POTION:SLOWNESS:@Self", "REMOVE_POTION:WEAKNESS:@Self"] }
  3: { chance: 45, effects: ["CURE:@Self"] }
