# Scorch — set the victim alight on hit. IGNITE defaults to the @Victim target.
display: "&6Scorch"
description: "Ignite the enemy you strike."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
max-level: 3
chance: { 1: 30, 2: 40, 3: 50 }
scale:
  burn: { 1: 40, 2: 80, 3: 120 }
effects:
  - { IGNITE: { duration: $burn } }
