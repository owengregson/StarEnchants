# Miners' Grace — the rhythm of the pick quickens your hands with Haste.
display: "&bMiners' Grace"
description: "Mining grants you a burst of Haste."
trigger: MINE
applies-to: [PICKAXE, SHOVEL, AXE, HOE]
group: mining
max-level: 3
chance: { 1: 25, 2: 35, 3: 50 }
cooldown: { 1: 200, 2: 160, 3: 120 }
scale:
  amp: { from: 0, step: 1 }
  dur: { from: 120, step: 40 }
effects:
  - { POTION: { effect: HASTE, amplifier: $amp, duration: $dur } }
levels:
  3:
    effects+:
      - { PARTICLE: { particle: CRIT, count: 6 } }
