# Counterstrike — answer the blow with one of your own. A DEFENSE enchant that reflects DAMAGE
# and saps the attacker. DAMAGE and POTION default targets differ, so each explicitly names
# @Attacker — the entity that just hit the wearer (a valid target on defender-side triggers).
display: "&cCounterstrike"
description: "Answer the blow with one of your own."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
levels:
  1: { chance: 25, effects: ["DAMAGE:3:@Attacker"] }
  2: { chance: 35, effects: ["DAMAGE:5:@Attacker", "POTION:WEAKNESS:0:60:@Attacker"] }
  3: { chance: 45, effects: ["DAMAGE:7:@Attacker", "POTION:WEAKNESS:1:80:@Attacker", "POTION:SLOWNESS:0:60:@Attacker"] }
