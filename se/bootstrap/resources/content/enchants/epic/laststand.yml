# Last Stand — dig in when the end is near. A DEFENSE enchant gated on the wearer's health
# (%actor.health%, a registered numeric fact §3.4): when a blow drops the wearer to the level's
# threshold it softens the hit (REDUCE_DAMAGE, additive defense bucket §6.1) and buffs the wearer
# with Resistance and Absorption (POTION defaults to @Self).
display: "&4Last Stand"
description: "Dig in when the end is near."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
max-level: 3
chance: 100
cooldown: { 1: 400, 2: 360, 3: 320 }
condition: { 1: "%actor.health% <= 6", 2: "%actor.health% <= 7", 3: "%actor.health% <= 8" }
scale:
  reduce: { 1: 40, 2: 55, 3: 70 }
  resAmp: { 1: 0, 2: 1, 3: 1 }
  resDur: { 1: 80, 2: 100, 3: 140 }
effects:
  - { REDUCE_DAMAGE: { percent: $reduce } }
  - { POTION: { effect: DAMAGE_RESISTANCE, amplifier: $resAmp, duration: $resDur, who: "@Self" } }
levels:
  2:
    effects+:
      - { POTION: { effect: ABSORPTION, amplifier: 0, duration: 120, who: "@Self" } }
  3:
    effects+:
      - { POTION: { effect: ABSORPTION, amplifier: 1, duration: 160, who: "@Self" } }
