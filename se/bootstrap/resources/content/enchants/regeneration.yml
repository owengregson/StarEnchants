# Regeneration — knit your wounds back together when struck. A DEFENSE enchant that grants
# the wearer the Regeneration potion effect (a version-volatile handle resolved to an interned
# id at compile time, §9). POTION defaults to @Self, so the buff lands on the wearer.
display: "&aRegeneration"
description: "Mend your wounds when struck."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
group: defense
levels:
  1: { chance: 25, effects: ["POTION:REGENERATION:0:60:@Self"] }
  2: { chance: 35, effects: ["POTION:REGENERATION:1:80:@Self"] }
  3: { chance: 45, effects: ["POTION:REGENERATION:1:120:@Self", "HEAL:2:@Self"] }
