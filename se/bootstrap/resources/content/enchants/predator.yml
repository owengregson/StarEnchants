# Predator (§A flow/chance clause, v3.1) — an ATTACK enchant that grows hungrier as its prey weakens.
# The condition is a CHANCE CLAUSE, not a gate: "%victim.health% < 6 : +N %chance%" adds N percentage
# points to the activation roll when the victim is below the threshold, and otherwise leaves the base
# chance untouched (a failing clause never stops the activation — see docs/reference/dsl-reference.md
# "Flow / chance clauses"). So Predator can always proc, but is markedly more likely to finish a wounded
# target. This is the authoring path the engine's Flow/chanceDelta types were always built for.
tier: rare
display: "&cPredator"
description: "More likely to strike harder against wounded prey."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: offense
levels:
  1:
    chance: 25
    condition: "%victim.health% < 6 : +25 %chance%"
    effects:
      - { DAMAGE_MOD: { side: attack, amount: 2 } }
  2:
    chance: 35
    condition: "%victim.health% < 6 : +35 %chance%"
    effects:
      - { DAMAGE_MOD: { side: attack, amount: 3 } }
  3:
    chance: 45
    condition: "%victim.health% < 6 : +45 %chance%"
    effects:
      - { DAMAGE_MOD: { side: attack, amount: 4 } }
