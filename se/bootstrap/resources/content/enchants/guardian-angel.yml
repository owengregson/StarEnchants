# Guardian Angel — a watcher that snatches you from the brink. A DEFENSE enchant gated on the
# wearer's health (%actor.health%, a registered numeric fact §3.4): when a blow drops the wearer
# low it cancels that hit (CANCEL negates the triggering event — used sparingly, here behind a
# health gate and a long cooldown), HEALs the wearer, and grants a Resistance buff (@Self).
display: "&eGuardian Angel"
description: "A watcher that snatches you from the brink."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
levels:
  1: { chance: 100, cooldown: 1200, condition: "%actor.health% <= 4", effects: ["CANCEL", "HEAL:4:@Self", "POTION:DAMAGE_RESISTANCE:0:60:@Self"] }
  2: { chance: 100, cooldown: 1000, condition: "%actor.health% <= 5", effects: ["CANCEL", "HEAL:6:@Self", "POTION:DAMAGE_RESISTANCE:1:80:@Self"] }
  3: { chance: 100, cooldown: 800, condition: "%actor.health% <= 6", effects: ["CANCEL", "HEAL:8:@Self", "POTION:DAMAGE_RESISTANCE:1:120:@Self", "POTION:ABSORPTION:1:120:@Self"] }
