# Thornmail — wrap yourself in spikes that bite back. A DEFENSE enchant that reflects DAMAGE
# onto the attacker. DAMAGE defaults to @Victim, so on this defender-side trigger it explicitly
# names @Attacker. The top tier also sets the attacker alight (IGNITE → @Attacker).
display: "&2Thornmail"
description: "Spikes that bite back at your attacker."
trigger: DEFENSE
applies-to: [CHESTPLATE]
group: defense
levels:
  1: { chance: 35, effects: ["DAMAGE:2:@Attacker"] }
  2: { chance: 45, effects: ["DAMAGE:4:@Attacker"] }
  3: { chance: 55, effects: ["DAMAGE:6:@Attacker", "IGNITE:40:@Attacker"] }
