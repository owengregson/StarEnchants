# Fireward — quench the flames the moment they catch. A FIRE enchant (fires on fire/lava
# damage): it EXTINGUISHes the wearer and grants Fire Resistance so the burn does not re-light.
# EXTINGUISH and POTION both default to @Self, so they protect the wearer.
tier: common
display: "&6Fireward"
description: "Quench the flames the moment they catch."
trigger: FIRE
applies-to: [ARMOR]
group: defense
levels:
  1:
    chance: 35
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 60, who: "@Self" } }
  2:
    chance: 50
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 100, who: "@Self" } }
  3:
    chance: 65
    effects:
      - { EXTINGUISH: { who: "@Self" } }
      - { POTION: { effect: FIRE_RESISTANCE, level: 1, duration: 160, who: "@Self" } }
      - { DAMAGE_MOD: { side: defense, mode: add, amount: 30 } }
