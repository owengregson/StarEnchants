# Leap — right-click to spring high into the air. LAUNCH supplies an upward velocity vector on the
# @Self target (its default); a brief Jump Boost softens the landing and a Cloud puff marks the
# take-off. An activated INTERACT_RIGHT ability behind a cooldown (§3.7).
display: "&bLeap"
description: "Spring high into the air."
trigger: INTERACT_RIGHT
applies-to: [BOOTS, WEAPON]
group: utility
levels:
  1: { chance: 100, cooldown: 180, effects: ["LAUNCH:0:0.9:0", "POTION:JUMP:1:60:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:2", "PARTICLE:CLOUD:15"] }
  2: { chance: 100, cooldown: 150, effects: ["LAUNCH:0:1.2:0", "POTION:JUMP:2:60:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:2", "PARTICLE:CLOUD:20"] }
  3: { chance: 100, cooldown: 120, effects: ["LAUNCH:0:1.5:0", "POTION:JUMP:2:80:@Self", "POTION:SPEED:0:80:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:2", "PARTICLE:CLOUD:30"] }
