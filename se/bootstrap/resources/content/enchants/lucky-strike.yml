# Lucky Strike — a rare swing of the pick rewards the fortunate miner.
tier: rare
display: "&eLucky Strike"
description: "A rare lucky break showers you with rewards."
trigger: MINE
applies-to: [PICKAXE, SHOVEL, AXE, HOE]
group: mining
max-level: 3
chance: { 1: 5, 2: 8, 3: 12 }
cooldown: 200
scale:
  exp: { 1: 8, 2: 14, 3: 22 }
  happy: { 1: 8, 2: 12, 3: 16 }
  pitch: { 1: 1, 2: 2, 3: 2 }
effects:
  - { MODIFY_EXP: { amount: $exp } }
  - { PARTICLE: { particle: HAPPY_VILLAGER, count: $happy } }
  - { SOUND: { sound: ENTITY_PLAYER_LEVELUP, volume: 1, pitch: $pitch } }
levels:
  1:
    effects+:
      - { MESSAGE: { channel: actionbar, text: "&eLucky Strike!" } }
  2:
    effects+:
      - { MESSAGE: { channel: actionbar, text: "&eLucky Strike!" } }
  3:
    effects+:
      - { MESSAGE: { channel: title, text: "&6Lucky Strike!", subtitle: "&eFortune favours you", fadeIn: 10, stay: 40, fadeOut: 10 } }
