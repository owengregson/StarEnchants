# Thunderstrike — call lightning down onto the foe you hit. LIGHTNING defaults to @Victim.
display: "&eThunderstrike"
description: "Summon lightning on your target."
trigger: ATTACK
applies-to: [SWORD, AXE]
group: combat
levels:
  1: { chance: 15, effects: ["LIGHTNING:2", "SOUND:ENTITY_GENERIC_EXPLODE:1:1"] }
  2: { chance: 22, effects: ["LIGHTNING:4", "SOUND:ENTITY_GENERIC_EXPLODE:1:1"] }
  3: { chance: 30, cooldown: 40, effects: ["LIGHTNING:6", "SOUND:ENTITY_GENERIC_EXPLODE:1:1", "MESSAGE:&eThunder answers your call!"] }
