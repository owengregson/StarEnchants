  2: { chance: 100, cooldown: 190, effects: ["LIGHTNING:5:@Nearest{r=6}", "SOUND:ENTITY_GENERIC_EXPLODE:1:1", "PARTICLE:CRIT:20"] }
  3: { chance: 100, cooldown: 160, effects: ["LIGHTNING:7:@Nearest{r=7}", "SOUND:ENTITY_GENERIC_EXPLODE:1:1", "PARTICLE:CRIT:30", "MESSAGE:&eThe storm obeys you!"] }
