# Lightning Rod — right-click to call a bolt down on the nearest foe. LIGHTNING targets @Nearest{r=...}
# (a held-item activation has no victim, so we pick the closest entity); the bolt's damage scales by
# level. An activated INTERACT_RIGHT ability behind a cooldown (§3.7); thunder sells the strike.
tier: epic
display: "&eLightning Rod"
description: "Call a bolt down on the nearest foe."
trigger: INTERACT_RIGHT
applies-to: [WEAPON, TRIDENT]
group: utility
max-level: 3
chance: 100
cooldown: { 1: 220, 2: 190, 3: 160 }
scale:
  damage: { 1: 3, 2: 5, 3: 7 }
  crit: { 1: 15, 2: 20, 3: 30 }
effects:
  - { LIGHTNING: { damage: $damage, who: "@Nearest{r=5}" } }
  - { SOUND: { sound: ENTITY_GENERIC_EXPLODE, volume: 1, pitch: 1 } }
  - { PARTICLE: { particle: CRIT, count: $crit } }
levels:
  2:
    effects:
      - { LIGHTNING: { damage: 5, who: "@Nearest{r=6}" } }
      - { SOUND: { sound: ENTITY_GENERIC_EXPLODE, volume: 1, pitch: 1 } }
      - { PARTICLE: { particle: CRIT, count: 20 } }
  3:
    effects:
      - { LIGHTNING: { damage: 7, who: "@Nearest{r=7}" } }
      - { SOUND: { sound: ENTITY_GENERIC_EXPLODE, volume: 1, pitch: 1 } }
      - { PARTICLE: { particle: CRIT, count: 30 } }
      - { MESSAGE: { text: "&eThe storm obeys you!" } }
