# Aura — right-click to radiate a defensive aura around yourself. POTION effects target @Self
# (the default) and stack a protective Absorption/Resistance shell. An activated INTERACT_RIGHT
# ability behind a cooldown (§3.7); the particle ring is cosmetic feedback for the activation.
display: "&bAura"
description: "Radiate a protective aura around yourself."
trigger: INTERACT_RIGHT
applies-to: [CHESTPLATE, WEAPON]
group: utility
levels:
  1: { chance: 100, cooldown: 240, effects: ["POTION:ABSORPTION:0:120:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:1", "PARTICLE:WITCH:20"] }
  2: { chance: 100, cooldown: 220, effects: ["POTION:ABSORPTION:1:140:@Self", "POTION:DAMAGE_RESISTANCE:0:120:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:1", "PARTICLE:WITCH:30"] }
  3: { chance: 100, cooldown: 200, effects: ["POTION:ABSORPTION:1:160:@Self", "POTION:DAMAGE_RESISTANCE:1:140:@Self", "POTION:FIRE_RESISTANCE:0:160:@Self", "SOUND:ENTITY_PLAYER_LEVELUP:1:1", "PARTICLE:WITCH:40"] }
