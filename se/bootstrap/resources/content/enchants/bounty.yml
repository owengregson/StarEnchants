# Bounty — slaying a foe pays out a reward. A KILL enchant using GIVE_MONEY to @Self (the default
# target). A no-op on a server with no economy provider. The deposit runs on the global thread.
display: "&eBounty"
description: "Collect a reward for every kill."
trigger: KILL
applies-to: [WEAPON]
group: combat
levels:
  1: { chance: 100, effects: ["GIVE_MONEY:50"] }
  2: { chance: 100, effects: ["GIVE_MONEY:100"] }
  3: { chance: 100, effects: ["GIVE_MONEY:200", "MESSAGE:&eBounty collected!"] }
