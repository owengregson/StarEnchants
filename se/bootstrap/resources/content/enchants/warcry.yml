# Warcry — bellow a battle cry on right-click, buffing yourself. An activated INTERACT_RIGHT
# ability (held-item trigger, §3.7) gated by a cooldown so it cannot be spammed. Every POTION
# names a version-volatile handle resolved to an interned id at compile time (§9) and defaults
# to the @Self target (the wielder), so no victim is needed for a held-item activation.
display: "&6Warcry"
description: "Bellow a battle cry to buff yourself."
trigger: INTERACT_RIGHT
applies-to: [WEAPON]
group: utility
levels:
  1: { chance: 100, cooldown: 200, effects: ["POTION:STRENGTH:0:120:@Self", "SOUND:ENTITY_WITHER_SPAWN:1:1", "MESSAGE:&6Warcry!"] }
  2: { chance: 100, cooldown: 180, effects: ["POTION:STRENGTH:1:120:@Self", "POTION:SPEED:0:120:@Self", "SOUND:ENTITY_WITHER_SPAWN:1:1", "MESSAGE:&6Warcry!"] }
  3: { chance: 100, cooldown: 160, effects: ["POTION:STRENGTH:1:160:@Self", "POTION:SPEED:1:160:@Self", "POTION:ABSORPTION:1:160:@Self", "PARTICLE:FLAME:30", "SOUND:ENTITY_WITHER_SPAWN:1:1"] }
