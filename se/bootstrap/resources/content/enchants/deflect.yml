# Deflect — turn aside part of the blow and shove the attacker back. A DEFENSE enchant that
# softens the hit (REDUCE_DAMAGE, additive defense bucket §6.1) and KNOCKBACKs the attacker
# away. KNOCKBACK on a defender-side trigger names @Attacker as the target it shoves.
display: "&bDeflect"
description: "Turn aside the blow and shove your attacker back."
trigger: DEFENSE
applies-to: [ARMOR]
group: defense
levels:
  1: { chance: 25, effects: ["REDUCE_DAMAGE:8", "KNOCKBACK:0.6:@Attacker"] }
  2: { chance: 35, effects: ["REDUCE_DAMAGE:14", "KNOCKBACK:1.0:@Attacker"] }
  3: { chance: 45, effects: ["REDUCE_DAMAGE:20", "KNOCKBACK:1.5:@Attacker"] }
