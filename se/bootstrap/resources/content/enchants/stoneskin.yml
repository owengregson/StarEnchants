# Stoneskin — harden your hide against the hit. A DEFENSE enchant that absorbs a flat amount of
# the incoming blow (DAMAGE_MOD defense/flat subtracts last in the damage fold §6.1, so it absorbs exactly
# that many points regardless of percent context). The top tier adds a Resistance buff (@Self).
tier: uncommon
display: "&8Stoneskin"
description: "Harden your hide against the hit."
trigger: DEFENSE
applies-to: [ARMOR]
group: defense
levels:
  1:
    chance: 35
    effects:
      - { DAMAGE_MOD: { side: defense, mode: flat, amount: 1 } }
  2:
    chance: 45
    effects:
      - { DAMAGE_MOD: { side: defense, mode: flat, amount: 2 } }
  3:
    chance: 55
    effects:
      - { DAMAGE_MOD: { side: defense, mode: flat, amount: 4 } }
      - { POTION: { effect: DAMAGE_RESISTANCE, level: 1, duration: 60, who: "@Self" } }
