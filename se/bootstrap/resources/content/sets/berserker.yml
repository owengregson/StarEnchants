# Berserker — a three-piece (pieces:3) armour bonus (§6.6). On DEFENSE, once three pieces are worn,
# pain fuels rage: Strength and Speed on @Self (POTION's default target) so taking a hit makes you
# hit harder. Levelless: trigger/chance/effects live at the file top.
display: "&4Berserker"
description: "Turn pain into rage when struck while wearing the set."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
pieces: 3
chance: 40
cooldown: 100
effects: ["POTION:STRENGTH:0:80:@Self", "POTION:SPEED:0:80:@Self", "PARTICLE:CRIT:10"]
