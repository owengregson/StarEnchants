# Yeti — a full-set (pieces:4) armour bonus (§6.6). The bonus fires on DEFENSE once all four worn
# pieces complete the set: it freezes the @Attacker (Slowness — valid only on DEFENSE, where an
# attacker exists) and shields @Self with Resistance. Levelless: trigger/chance/effects sit at the top.
display: "&bYeti"
description: "Freeze attackers when the full set is worn."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
pieces: 4
chance: 50
cooldown: 100
effects: ["POTION:SLOWNESS:1:60:@Attacker", "POTION:DAMAGE_RESISTANCE:0:60:@Self", "PARTICLE:CLOUD:10"]
