# Titan — a full-set (pieces:4) armour bonus (§6.6). On DEFENSE the completed set hardens you: it
# feeds the reduction arbiter via DAMAGE_MOD defense/add (capped at 100 by ParamSpec, CONTEXT_LOCAL) and
# layers Resistance on @Self. Levelless: trigger/chance/effects sit at the file top.
display: "&8Titan"
description: "Harden against blows when the full set is worn."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
pieces: 4
chance: 100
effects:
  - { DAMAGE_MOD: { side: defense, mode: add, amount: 15 } }
  - { POTION: { effect: DAMAGE_RESISTANCE, level: 1, duration: 80, who: "@Self" } }
