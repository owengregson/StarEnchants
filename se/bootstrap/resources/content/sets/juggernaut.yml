# Juggernaut — a three-piece (pieces:3) armour bonus (§6.6). On DEFENSE, once three pieces are worn,
# it makes you immovable: Resistance and Absorption on @Self, while shoving the @Attacker back
# (KNOCKBACK — an attacker exists only on DEFENSE). Levelless: trigger/chance/effects sit at the top.
display: "&6Juggernaut"
description: "Stand immovable and shove attackers when the set is worn."
trigger: DEFENSE
applies-to: [HELMET, CHESTPLATE, LEGGINGS, BOOTS]
pieces: 3
chance: 60
cooldown: 80
effects: ["POTION:DAMAGE_RESISTANCE:0:60:@Self", "POTION:ABSORPTION:0:80:@Self", "KNOCKBACK:1.5:@Attacker"]
