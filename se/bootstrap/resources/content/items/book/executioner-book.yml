# Executioner Book — an enchant book that grants the Executioner enchant on a successful apply. A
# content book/tome/gem rolls its `apply.success-chance`; on failure it destroys the gear (unless a
# Protect Scroll spared it), and a Success Dust raises this book's effective success chance (ADR-0019).
display: "&4Executioner Book"
description: "Apply to a sword or axe to grant Executioner."
tier: mythic
kind: book
material: ENCHANTED_BOOK
grants: { enchant: enchants/executioner, level: 1 }
apply: { success-chance: 60, destroy-on-fail: true }
