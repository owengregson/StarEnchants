# Success Dust — combine onto an enchant book to raise its success chance (ADR-0019). A carrier of
# kind `dust` confers a flat `grants.success-bonus`; dragging it onto a content book adds that bonus to
# the book's stored success (clamped so a book can never exceed 100%). Pure economy metadata — it never
# compiles to an ability and never touches the combat hot path.
display: "&aSuccess Dust"
description: "Combine onto an enchant book to boost its success chance."
tier: uncommon
kind: dust
material: GLOWSTONE_DUST
grants: { success-bonus: 15 }
