# Swift Crystal — a flat, levelless socket bonus (§6.5). On DEFENSE (when you take a hit) it grants
# a burst of Speed to @Self (POTION's default target) to help you reposition. A short cooldown keeps
# the buff from refreshing on every tick of damage.
display: "&bSwift Crystal"
description: "Surge with Speed when you are struck."
trigger: DEFENSE
applies-to: [BOOTS, LEGGINGS]
chance: 100
cooldown: 60
effects: ["POTION:SPEED:0:60:@Self"]
