# Ember — a levelless socket bonus (ADR-0014, ADR-0034). Its likeness is the global items/crystal.yml; this
# file declares the styled name, the bonus block, and (single-ability shorthand) one trigger + effects. On an
# ATTACK it sets the foe alight via IGNITE (@Victim by default); duration is in ticks (60 = 3s).
display: "&6Ember"
description:
  - "&6&lEMBER CRYSTAL BONUS"
  - "&6* 60% chance on hit to set your foe alight for 3 seconds."
tier: uncommon
applies-to: [SWORD, AXE]
trigger: ATTACK
chance: 60
effects:
  - { IGNITE: { duration: 60 } }
  - { PARTICLE: { particle: FLAME, count: 8 } }
