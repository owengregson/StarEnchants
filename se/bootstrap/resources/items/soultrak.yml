# SoulTrak Gem (docs/v3-directives.md §I) — drag onto a weapon to reveal the LIFETIME number of players killed
# with it. The count is tracked in the BACKGROUND on every eligible weapon from first use, so an applied gem
# shows a true total. Applied items are not exclusive — gear may carry several traks (blocktrak / mobtrak /
# soultrak) and a white/holy scroll at once. One physical item per file; reload with /se reload. Messages: lang.yml trak.*.
type: soultrak

material: FIRE_CHARGE
name: "&c&lSoulTrak Gem"
# {KINDS} expands to the grammatically-joined applies-to label. Lore auto-wraps at config lore.item-wrap.
lore:
  - "&eDisplays the amount of players killed with the weapon since it was forged."
  - ""
  - "&eApplies to: &r&f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
# Item-group kinds this gem applies to (and whose lifetime is tracked): e.g. WEAPON, SWORD, AXE, ALL.
applies-to: [WEAPON]
# The line stamped onto the applied item; {COUNT} = the live, comma-grouped count.
count-format: "&7Players Killed: &f{COUNT}"
