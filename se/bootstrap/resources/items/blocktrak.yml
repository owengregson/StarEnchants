# BlockTrak Gem (docs/v3-directives.md §I) — drag onto a tool to reveal the LIFETIME number of blocks broken
# with it. The count is tracked in the BACKGROUND on every eligible tool from first use, so an applied gem
# shows a true total (not one starting at zero). An item holds only ONE applied item at a time (blocktrak /
# mobtrak / soultrak / white scroll / holy white scroll). One physical item per file; reload with /se reload.
# Messages live in lang.yml (trak.*).
type: blocktrak

material: SLIME_BALL
name: "&aBlockTrak Gem"
# {KINDS} expands to the grammatically-joined applies-to label. Lore auto-wraps at config lore.item-wrap.
lore:
  - "&eDisplays the amount of blocks broken with the tool since it was forged."
  - "&eApplies to: &r&f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
# Item-group kinds this gem applies to (and whose lifetime is tracked): e.g. TOOL, PICKAXE, AXE, ALL.
applies-to: [TOOL]
# The line stamped onto the applied item; {COUNT} = the live, comma-grouped count.
count-format: "&7Blocks Broken: &f{COUNT}"
