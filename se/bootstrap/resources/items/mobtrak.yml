# MobTrak Gem (docs/v3-directives.md §I) — drag onto a weapon to reveal the LIFETIME number of mobs slain
# with it. The count is tracked in the BACKGROUND on every eligible weapon from first use, so an applied gem
# shows a true total. Traks are not exclusive — a weapon may carry MobTrak and SoulTrak at once, and a trak
# coexists with a white/holy scroll. One physical item per file; reload with /se reload. Messages: lang.yml trak.*.
type: mobtrak

material: MAGMA_CREAM
name: "&e&lMobTrak Gem"
# {KINDS} expands to the grammatically-joined applies-to label. Lore auto-wraps at config lore.item-wrap.
lore:
  - "&eDisplays the amount of mobs slain with the weapon since it was forged."
  - ""
  - "&eApplies to: &r&f&n{KINDS}"
  - "&7Drag n' Drop on an item to apply."
# Item-group kinds this gem applies to (and whose lifetime is tracked): e.g. WEAPON, SWORD, AXE, ALL.
applies-to: [WEAPON]
# The line stamped onto the applied item; {COUNT} = the live, comma-grouped count.
count-format: "&7Mobs Slain: &f{COUNT}"
