# Transmog Scroll (docs/v3-directives.md §I) — drag onto enchanted gear to ORGANISE its enchant lore by
# rarity (highest-weight tier on top; cosmetic, combat is order-independent) and stamp the enchant count into
# the item name. Real Minecraft enchants render above the lore by the client, so they sit above the custom
# block. Re-applicable: a second apply re-sorts and REPLACES the count suffix (never stacks it). For a
# hand-picked order, use the Godly Transmog tool. One physical item per file; reload with /se reload.
type: transmog-scroll

material: PAPER
name: "&c&lTransmog Scroll"
# Authored lore lines auto-wrap at config lore.item-wrap.
lore:
  - "&eOrganizes enchants by &f&nrarity&r&e on your item and adds the &denchant &bcount &eto the name."
  - "&7Drag n' Drop on an item to apply."
# Appended to the gear's display name when transmogged; {COUNT} = the item's total enchant count.
# A re-transmog strips a prior suffix matching this template and re-stamps, so the count never duplicates.
name-suffix: "&r &d[&b&l&n{COUNT}&r&d]"
